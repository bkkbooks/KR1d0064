body:
  text: 坊記集傳卷一眀黃道周撰大坊章第一子言之君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲禮者天之教也刑者天之制也命者天之令也王者本天百姓本王聖人因天與王以立其坊損益百世以為春秋春秋五始皆以明禮糾刑申天之令也命始於元年行於春中於王發于正月著于位順者為之禮逆者為之刑因人之性無有不足其有不足者情欲泄敗而末流自匱也聖人以性坊情以命坊性察其原始而救其末流故為三坊以著於春秋春秋之禮有郊有禘有朝有聘有薨有葬有祀有饗有親迎有即位有從王在內者正始為大在外者從王為大春秋之刑有去爵去名去氏有伐有殺有執有刺有放大者施之諸侯細者施之于盜在外者坊及盟主在內者坊及小君亦唯是天所命禮王所命刑也天王所命本於無欲故無欲之為天有欲之為人無欲之為王有欲之為霸春秋以是三者差等百王治當世之諸侯大夫故知命者足以立禮立禮者足以去刑去刑者足以作樂崇德殷薦之上帝以配祖考也易恆言禮書恆言刑詩恆言命夫子兼取之以為春秋春秋以命歸天以刑歸王以禮歸聖因三者而為之律度權衡是樂所繇起也樂生于律律生于春秋春秋立而刑與樂不别為經使知命守禮者為之則刑與樂取之律度而無不足也是記者所述春秋之旨也隱公元年春王正月具四始而不書即位是禮以坊德之始也禮元妃薨則繼室為夫人隱公出于聲子桓公出于仲子聲子繼正也仲子非繼正也而隱公推父之意攝位以俟桓公既攝位以俟桓公則必貶母以尊仲子既貶母以尊仲子則必不可一日與於會盟宗祏之位故隱公之為禮不足於德其為德不足于禮也然則桓公即位乎曰未即位也未即位則誰為喪主曰皆攝也攝則必有嗣主猶周公之復子也而宗祏盟會皆稱曰公故公非攝也非攝而不即位為文者也春秋不以文滅質故於隱公缺正始焉秋七月天王使宰咺來歸惠公仲子之賵天王使賵仲子則仲子未為夫人也未為夫人而賵之則仲子得為夫人也仲子得為夫人則隱公必沒尊其繼嫡生絀其慈母故寪舍之禍則于是始也二年十有二月乙卯夫人子氏薨是春秋之與聲子也沒者從夫必曰仲子生者從子必曰夫人天王不以夫人賵仲子通國不得以聲子讓夫人故公有讓而夫人無讓公有攝而夫人無攝也則安得以聲子之夫人為仲子之夫人也三年夏四月辛卯君氏卒春秋開卷而有疑禮者四焉攝之非君也賵之非死也子之疑夫人也君之疑男子也然而皆質質則無疑之矣仲子非沒天王不賵已為夫人不稱仲子為隱公母不讓夫人此三者天下之至質也隱公不即位則不以其妻祔廟不以其妻祔廟而不得不以其妻稱君此一者天下之至文也文質者德禮之所從出也隱公以泰伯之文行周公之質不得以泰伯之質還周公之文春秋於此有所不足也有所不足而後坊之坊之如何曰七年而讓讓而終老讓弟之與復辟夫固有其家譜矣五年考仲子之宫初獻六羽考宫則近於别子也初獻則近於殺也夫猶以為仲子也舉妻從君舉母從夫人正廟從親别廟從貴隆禮從今殺禮從古隱公自以為精於禮也而粗于德故為德而不足以坊禮猶為禮之不足以坊德也桓公元年春王正月公即位宣公元年春王正月公即位與夫弒一也宣公末減矣而其詞同何也夫皆責王也王雖不討而恐有為王討者則必以王為詞故以公與之則亦公之天也夫不即位者不猶得天乎故隱莊閔僖皆得夫四始之正也不得其正而王不正則將假天以正之故為之著王焉耳文公四年冬十有一月壬寅夫人風氏薨五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風猶是夫人也襄王得以與成風則桓王亦得以與仲子桓王與仲子則隱公不得尊聲子隱公既以絀其母夫人則不得不絀其君夫人故文公以其夫人絀於敬嬴敬嬴以其夫人上於哀薑是亦有王也而謂時王之不足以絀滕侯者過也閔公二年夏五月乙酉吉禘于莊公吉禘者未可以吉禘也去莊公之喪二十有二月邇祥而稱吉殤子般也於子般無喪於莊公稱祥則亦可以吉矣禘者祀祭之通稱也祫祭之禘必於太廟吉祭之禘則於莊公于莊公則可以六羽矣然必八佾者八佾之制不自莊公始也然則何知不為夾禘也曰不曰致莊公而曰于莊公也然則莊公非始僭者與詩曰周公之孫莊公之子丹楹刻桷自莊公始也曰朱干玉戚白牡騂剛亦不自莊公始也僖公八年秋十月禘于太廟用致夫人是則祫祭也祫祭而致夫人崇薑氏也崇薑氏者何霸主之女與於廟事副禕薦盎出于西房夫有天子之禮樂焉猶哀薑之用幣也然則夫人不可致于太廟乎曰禘太廟則志在太廟致夫人則志在夫人也然則夫人之不稱薑氏何也曰致夫人無所致氏也然則是禮與曰禮也夫猶有侈心焉又眀年公及夫人薑氏會齊侯于陽穀是則非禮也太廟之致夫人則亦謂此也僖公三十一年夏四月四卜郊不從乃免牲猶三望公羊子曰三卜禮也四卜非禮也求吉之道三禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封內者則不祭也穀梁子曰夏四月不時也然則元冬孟春魯可以祭乎左氏曰禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也然則不卜而可以郊乎曰有其舉之舉不為創人而疑天其天則從魯之有郊不自僖公始也其疑郊則自僖公始也其疑郊何也以為諸侯不得郊而周公得禘禘則以太廟凖於明堂郊則以閟宫等於圜丘以明堂享周公則魯公可以配以閟宫享后稷則魯公不可以祭不可以祭而後疑之疑而後卜之卜而疑而後四之然則以後之卜者皆疑乎曰僖公疑先公者也後公疑僖公者也然則不疑而舉之是乎曰何為其不疑而舉之也頌曰乃命魯公俾侯于東錫之山川土田附庸未有殊錫焉與其不疑而舉之則何如不疑而曠之也故僖公之疑先公是也後公之疑僖公則不是也然則三望是乎曰南望衡霍西望華首北望恆阿則不是也若泰山河海則未為不是也頌曰泰山巖巖魯邦所瞻奄有龜蒙遂荒大東至于海邦淮夷來同言十六年于淮之會也僖公以齊桓愛壻九合諸侯再從晉文經略諸夏兩郤楚師再朝王所宜其功有可稱者而以郊師二事為儒者詆譏考其從來固已久矣疑而卜卜而不舉在僖公之禮未為壞德也宣公三年春王正月郊牛之口傷改卜牛牛死乃不郊何為其言之厲辭也宣公繼子赤者也子赤甫二年天王之崩甫二月而夸舉之故為之厲辭也厲辭則大其坊不厲辭則不大其坊成公七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛夏五月不郊猶三望言猶者通可已之辭也穀梁子曰乃者亡乎人之辭也亡乎人則天矣故君子於禮知刑亦於禮知命也十年夏四月五卜郊不從乃不郊瀆則不告已逺於君子矣不違龜筮則猶未逺於君子也十有七年九月辛丑用郊是何用之曰不卜而用之也用則不卜卜則不得用或曰春卜也卜以九月上辛而遂用之夏正七月也天王郊以正月則魯郊以七月魯之重秋嘗也先郊而後禘以夏正寅月佩弓韣建龍旗以祈穀于南郊以周正申月載嘗楅衡祈成於眀堂魯於春秋擇取一焉謂之春秋故春秋者郊社禘嘗之阼也然則是禮與曰蓋有是典焉而世一用之然則成公之為之何也曰是嵗也公會尹子單子五國伐鄭盟于柯陵歸而張之夫以蓋沙隨之耻則亦舍苕丘者之為也襄公七年夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也然則魯之用郊専為祈穀也専為祈穀而春秋非之何也謂其龍旗大輅用天子之事也然則是誰為之季孫宿之為也季孫新嗣也而見討于晉歸而張之亦猶之苕丘定公十有五年春王正月鼷鼠食郊牛牛死改卜牛夏五月辛亥郊哀公元年春王正月鼷鼠食郊牛改卜牛夏四月辛巳郊夫是則郊可不用也而猶嵗用之春秋舉其不用者而遺其用者以是見刑亦以是見禮以是見禮亦以是見命故禮之不足坊德者聖人有所不取也然則昭公可謂知禮乎左氏曰公如晉自郊勞至於贈賄無失禮晉侯謂女叔曰魯侯不亦善于禮乎女叔對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也姦大國之盟陵虐小國利人之難不知其私公室四分民食于他思莫在公不圖其終為國君難將及身不恤其所禮之本末將于此乎在而屑屑焉習儀以亟言善於禮不亦逺乎公羊子曰昭公將殺季氏告子家駒曰季氏為無道僭于公室久矣吾欲殺之如何子家駒曰諸侯僭于天子大夫僭于諸侯久矣昭公曰吾何僭矣哉子家駒曰設兩觀乘大輅朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也且夫牛馬維婁委巳者也而柔焉季氏得民衆久矣君無多辱夫雉門兩觀亦不自昭公始也禮失以漸而德敗以頓故君子防之為貴也然則春秋誰為知禮者乎曰其鄭子産子太叔楚觀射父乎子産卒子太叔為政黃父之會趙簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何為禮對曰吉也聞之先大夫子産曰禮天之經也地之義也民之行也天地之經而民實則之則天之眀因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦內外以經二物為父子兄弟姑姊甥舅婚媾姻婭以象天眀為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震耀殺戮為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生於六氣是故審則宜類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生于好怒生于惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協夫天地之性是以長久故如子太叔之言禮則通于命矣禮之與命非二物也是所謂哀樂之節而中和之本也楚子期祀致牛俎于楚子楚子問觀射父曰祀牲何及對曰祀加于舉天子舉以太宰祀以會諸侯舉以特牛祀以太牢卿舉以少牢祀以特牛大夫舉以特牲祀以少牢士食魚炙祀以特牲庶人食菜祀以魚上下有序民則不慢王曰其大小何如對曰郊禘不過繭栗蒸嘗不過把握王曰何其小也對曰夫神以精眀臨民者也故求備物不求豐大是以先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之百姓千品萬官億醜兆民經入畡數以奉之眀德以昭之和聲以聽之以告遍至則無不受休楚子曰祀不可以已乎對曰祀所以昭孝息民撫國家定百姓也古者先王日祭月享時類嵗祀諸侯舍日卿大夫舍月士庶人舍時天子遍祀羣臣品物諸侯祀天地三辰及其土之山川卿大夫祀其禮士庶人不過其祖日月會于龍􅔀土氣含收天眀昌作百嘉備舍羣神頻行國于是乎蒸嘗家于是乎嘗祀于是乎合其州鄉朋友婚姻比爾兄弟親戚于是乎弭其百苛妎其讒慝合其嘉好億其上下以中固其姓上所以教民虔也下所以昭事上也天子禘郊之事必自射其牲王后必自舂其粢諸侯宗廟之事必自射其牛刲羊擊豕夫人必自舂其盛况其下人誰敢不戰兢以事百神楚子曰所謂一純二精七事者何也對曰聖王正端冕以不違心帥其羣臣以臨監事無有苛慝于神謂之一純玉帛為二精天地民及四時之務謂之七事是射父之言祀猶未及于禮也又以天地三辰濫諸侯之祀然已得其意足為民坊故世之知禮者不衆也然則齊桓公可謂知刑乎殺我薑氏不阿其親於是慶父殪於莒曰薑氏襄公之屬也我桓公之夫人非桓公所得而殺也且慶父未戮而戮薑氏非所為令也召陵之會執轅濤塗以為屝屨之不共則猶有申侯之讒焉晉滅虞虢而不能討也楚伐江黃而不能救也然則春秋皆刑也無復知刑者與魯之兩刺皆哀也諸侯之殺其大夫者無數而皆不得其主名然則春秋孰為知刑者乎曰公子友叔向楚子其可謂知刑乎季友既鴆叔牙越在陳國人召而歸之共仲出奔莒共仲以為季子歸不吾討也而季子竟討之召於莒使奚斯哭之共仲乃縊而死故季友為政而鴆一兄殺一公子使齊桓公不敢有其姑姊妹故季友可謂知刑矣羊舌鮒者叔向之弟也邢侯與雍子爭田雍子納女於鮒以求直及弊獄之日叔魚抑邢侯邢侯殺叔魚與雍子于朝韓宣子患之叔向曰三姦同罪請殺其生者而戮其死者宣子曰如何對曰鮒也鬻獄雍子賈之以其子邢侯非其官也而干之夫以回鬻國之中與絶親而置直非司冦而擅殺一也遂施邢侯氏而尸叔魚雍子于市故叔向可謂知刑矣宣公十一年冬楚子伐陳謂陳人無動吾將討於少西氏遂入陳殺夏徴舒轘諸栗門以徴舒之惡親弒其君踰年莫討而楚子討之楚子不可謂知刑乎而春秋黜之以為楚人何也株林之亂罪在靈公及公孫寧儀行父靈公已弒陳國已滅而楚人不討二子又納之於陳是春秋所謂楚人也然則春秋之刑如何曰春秋之刑察其源而大其坊者也察其源而大其坊如何趙穿弒君而趙盾不禁則趙盾之罪浮於趙穿鄭子公弒君而子家不禁則子家之罪浮于子公謂趙盾之足以制趙穿子家之足以制子公也然則春秋不畏逸賊與曰畏逸賊也畏逸賊則齊商人之死不討歜職莒庶其之弒不討莒僕晉胥童之弒不討欒書鄭髠頑之卒不討子駟楚子麋之卒不討棄疾蔡侯申之卒不討公孫翩者何也曰各有取之也以國者與國以人者與人存正者去疑存大者舍細然則春秋諼獄與曰何為其諼獄也出欒書而入趙盾出去疾而入歸生出子駟而入子干出陽生而入陳荼出莒僕而入許止也曰是天制之非人所能定也不眀禮不足以眀刑故聖人重言之也亦共言禮而已矣然則邾文公可謂知命乎邾文公卜遷於繹史曰利于民而不利于君邾子曰苟利于民孤之利也天生民而樹之君以利之也民既利矣孤向與焉左右曰命可長也君何弗為邾子曰命在養民死之修短時也民苟利矣吉莫如之遂遷于繹遷而邾文公卒君子曰知命夫有知命而從宋襄公用人於社者乎命者春秋之所罕言也春秋以命與王以王與天謂王足以命禮則書王以賵仲子成風謂王足以命刑則書天王殺其弟佞夫王札子殺召伯毛伯謂王足以命命則書王使榮叔來錫桓公命故以命與王以王與天聖人于此亦未有定也亦曰與禮而已矣然則春秋孰為知命者乎曰皆在于周室其人無事專內而道古本天稱王足以照四方之善敗若內史過內史興單襄公劉康公其人也惠王十五年有神降于莘王問于內史過曰是固有之乎對曰有之國之將興其君齊明衷正精潔惠和其德足以昭其馨香其惠足以同其民人神饗而民聽故眀神降之觀其政德而均布福焉國之將亡其君貪冒辟邪淫佚怠荒粗穢暴虐其政腥臊馨香不登其刑矯誣百姓擕二民神怨恫無所懷依故神亦往焉觀其苛慝而降之禍是以或見神以興或見神以亡昔夏之興也融降于崇山其亡也回祿信于聆隧商之興也檮杌次于丕山其亡也夷羊在牧周之興也鸑鷟鳴于岐山其衰也杜伯射王於鄗是皆眀神之志也王曰今是何神也對曰昔昭王娶於房是曰房后實有爽德協于丹朱丹朱馮身以儀之生穆王焉實照臨周之子孫而禍福之繇是觀之其丹朱乎王曰誰受之對曰在虢土然則何為對曰臣聞之道而得神謂之逢福淫而得神是為貪禍今虢少荒其亡乎王曰幾何對曰昔堯臨民以五今其胄見神之見也不過其物由是觀之不過五年是史過之語異于春秋之不語也故有借神怪以坊欲者史過是也晉文公之初入也襄王使太宰文公及內史興錫公命上卿逆于境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宫設桑主布几筵太宰涖之晉侯端委而入太宰以王命命冕服內史贊之三命而後即冕服既畢賔饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道也成禮義德之則也則德以道諸侯諸侯必歸之且禮以觀忠信仁義也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不擕若民不怨而財不匱令不偷而動不擕其何事不濟臣入晉境四者不失其能禮矣樹于有禮艾人必豐王其善之王從之使于晉者道相逮也先是內史過錫晉惠公命吕甥卻芮相晉侯不敬晉侯執玉卑拜不稽首內史過歸告王曰晉不亡其君必無後且吕卻將不免史過又曰昔者先王既有天下又崇立上帝眀神而敬事之於是乎有朝日夕月以教民事君諸侯春秋受職于王以臨其民大夫士日恪位著以警其官庶人工商各守其業以供其上猶恐有失墜也故為車服旗章以旌之為摯幣瑞節以鎮之為班爵貴賤以列之為令聞嘉譽以聲之猶有散遷解慢而著在刑辟流在裔土於是乎有蠻夷之國有斧鉞刀墨之民而况可淫縱其身乎夫晉侯非嗣也而得其位亹亹怵惕保任戒懼猶曰未也若將廣其心而逺其鄰陵其民而卑其上何以固守夫執玉卑替其摯也拜不稽首誣其王也替摯無鎮誣王無民夫天事恆象任大享重者必速及故晉侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其祿弗諫而阿之亦將及焉八年晉侯隕於韓懷公殺而甥芮與于難故曰威儀所以定命也知禮而後知命若史興史過者知所以定命矣定王八年使劉康公聘魯發幣于大夫季文子孟獻子皆儉叔孫宣子東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寬肅宣惠君也敬恪恭儉臣也寬所以保本也肅所以濟時也宣所以教施也惠所以和民也本固而功成施遍而民阜乃可以長保民矣其何事不徹敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以共給事則寬於死以儉足用則逺於憂承命不違守業不懈寬于死而逺于憂則可以上下無隙矣其何任不堪上任而徹下堪其任所以令聞長世也今二子者儉則能足用矣足用則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之廣其身國家弗堪亡之道也王曰幾何對曰東門之位不若叔孫而泰侈焉不可以事二君叔孫之位不若季孟而亦泰侈焉不可以事三君若皆早世猶可若登年以載其毒必亡十六年魯宣公卒赴者未及東門氏來告亂子家奔齊簡王十一年魯叔孫宣伯亦奔齊故王季子知命亦所謂知刑者也柯陵之會單襄公見晉厲公視逺步髙晉卿郤錡見單子其語犯郤犨見其語迂郤至見其語伐齊國佐見其語盡魯成公見言及晉難及卻犨之譖單子曰君何患焉晉將有亂其君與三郤當之乎魯侯曰寡人懼不免焉今君曰晉將亂敢問天道乎抑人故也對曰吾非瞽史焉知天道吾見晉君之容而聽三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以步目今晉侯視逺而足髙目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯國之大事也國將無咎其君在會步言視聽必皆無謫則可以知德矣視逺日絶其義足髙日棄其德言爽日反其信聽淫日離其名夫目以處義足以踐德口以庇信耳以聽召者也故不可不慎也偏喪有咎既喪則國從之晉侯爽二吾是以云夫卻氏晉之寵人也三卿而五大夫可以戒懼矣髙位實疾僨厚味實臘毒今卻伯之語犯叔迂季伐犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有乎吾聞之國德而鄰于不修必受其福今君逼於晉而鄰于齊齊晉有禍可以取霸無德之患何憂于晉且夫長翟之人利而不義其利淫矣流之若何魯侯歸乃逐叔孫僑如眀年晉殺三卻又眀年晉人弒厲公齊人殺國武子故逺於禮則必近于刑近于刑則必逺于命王季子單襄公非知命也亦曰知禮而已然則端木賜可謂知命乎定公十五年春王正月邾子來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎于是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎故命禮刑此三者相為終始也有是三者以坊其不足則春秋其至矣去亂章第二子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡魯隱公元年夏五月鄭伯克段于鄢左氏曰初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請于武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二于已公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之毋生民心公曰毋庸將自及大叔又收二以為己邑至于廩延子封曰可矣厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔假假入于鄢公伐諸鄢五月辛丑大叔出奔共書曰鄭伯克段於鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也公羊氏曰克之者何殺之也殺則曷謂之克大鄭伯之惡也曷為大鄭伯之惡母欲立之已殺之如勿與而已矣穀梁之説猶是也夫公穀則未知春秋之意也春秋之意以越禮自下坊德自上節情而止亂君子之事也叔段欲京則與之京欲二則與之二無禮以止之則猶之教驕亂者矣教驕亂而後克之則幾乎恐不克之也夫是為三桓而發也夫子以叔段起三桓以鄢起郈與費圍成之不克亦夫子之所憖也夫子將筆之書又與二三子討論其義丁寧于坊表之始故坊表記者春秋之開塞也得其三坊而春秋之義燦乎著矣隱公四年二月戊申衛州吁弒其君完左氏曰衛莊公娶于齊東宫得臣之妹曰莊薑美而無子衛人所為賦碩人也又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊薑以為已子公子州吁嬖人之子也有寵而好兵公弗禁莊薑惡之石碏諌曰臣聞愛子教之以義方弗納于邪驕奢淫佚所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之毋乃不可乎弗聽其子厚與州石碏吁遊禁之不可桓公立石碏乃老於是州吁弒桓公亦遂殺厚也故左氏之為傳深達于坊記之義也小人之約至于盜盜至于尉止齊豹公孫翩陽虎刑之所得而誅也小人之驕至于亂亂至于叔段州吁刑之所不得而誅也刑窮而後兵兵窮而先王之禮教道命皆盡矣故鄭衛之詩春秋所為坊始也左傳初晉穆侯之夫人薑氏以條之役生太子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之命子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔于曲沃靖侯之孫欒賔傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有二宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年潘父弒昭侯而納桓叔不克晉人立孝侯曲沃莊伯又伐翼弒孝侯其後曲沃卒有晉詩所為賦椒聊也故左氏之義與坊表同旨也昭公元年夏秦伯之弟針出奔晉左氏曰秦后子有寵于桓如二君于景其母曰弗去懼選癸卯針適晉其車千乘書曰秦伯之弟針出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡于此乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也秦公子亦可謂驕而不降者矣何令圖之有襄公二十二年楚殺其大夫公子追舒左氏曰楚觀起有寵于令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君安用之泄命重刑臣亦不為王遂殺子南于朝轘觀起于四境子南之臣謂棄疾請尸棄疾不可三日乃請許之其徒曰行乎曰吾與弒吾父行將焉入然則臣乎曰棄父事讎吾弗忍也遂縊而死甚矣棄疾之似張宗魯也追舒之罪未至死故春秋不去其公子而存其大夫棄疾不以尸謝楚而以死出其父是則與于弒父者也然而楚子可謂能制矣先是申侯有寵于楚文王文王將死與之璧使行曰唯我知女女専利而不厭豫取豫求不女瑕疵也後之人將求多于女女必不免我死女必速行無適小國將不女容焉既而不容于鄭故如楚文王亦可為能制矣然而無當于禮知禮者其唯齊晏子乎左氏曰齊侯與晏子坐于路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施于民豆區釡鍾之數其取之公也薄其施之民也厚公厚斂焉陳厚施焉民歸之矣詩曰雖無德與女式歌且舞民歌舞之矣公曰善哉是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也齊之不知禮者其唯慶封乎襄公二十八年冬齊慶封來奔左氏曰慶封伐內宫弗克反陳于嶽請戰弗許遂來奔獻車于季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封泛祭穆子不悅使工為之誦茅鴟亦不知既而齊人來讓奔吳吳勾餘豫之朱方聚其族焉居之富于其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃夫穆子則庶乎知命也命者天所坊欲也定公十四年春衛公叔戌來奔左氏曰初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免于難上下同之戍也驕其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及文子卒衛侯始惡于公叔戍戍又欲去夫人之黨夫人訴之曰戌將為亂故曰約斯盜驕斯亂以文子之文也而不能庇其子其道不足以制富貴故也制富貴則可以制亂矣已畔章第三子云貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有畔者襄公十有一年春王正月作三軍左氏曰季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征之孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍是穆子之盟之也穆子盟之而曰使盡為臣何也臣有定祿者也政無定祿者也子弟亦定也政無定也季氏樂其無定者以要於仲叔仲叔執其有定者以要于季氏則盟詛相挾矣季氏于是則必有悔也曰吾以一軍從政行李賦役之不供而臣子弟受祿於二家又曰取之公也二子得其名吾不盡其實則其改作無怪矣貪亂荼毒必自此始也是所謂必畔之道也然則魯舊有三軍乎曰二軍二軍則詩謂公徒三萬何也曰二軍之數二萬五千人侈言之也曰紅之搜革車千乘千乘之卒七萬五千人而曰不足三軍何也曰天子六鄉六遂得十二軍只用六軍大國六軍只用三軍魯賦之實八百乘不足三軍自隱公以來取郜取防滅項取須句取向取根牟取繹取鄟浸大矣以事盟主則毁乘而損賦以張其國則加乘而益軍故入鄆入邿者季孫之志以為若臣若子若弟非季孫之志也然則季氏之臣子弟孰主之乎曰三家之臣子弟皆自主也而孟叔以給于公兩半而一全猶之三分公室公與孟叔兩而參之故云五分而公得二者過也于是三家之富皆三百乘而季氏倍征富于周公然則季氏倍征而民歸之何也曰已則蠲征倍征其於周公者也昭公五年春王正月舍中軍左氏曰卑公室也毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公其後公室遂無臣也然則叔孫氏使盡為臣而曰臣其子弟何也曰叔孫之臣子弟則猶之盡為臣也父兄臣而其子弟焉往乎然則季氏之毁中軍何也曰中軍當政於外二軍當賦于國毁中軍則四方有事二子皆均之然則作三軍而後叔孫豹會伐秦叔老會伐許仲孫速會向仲孫羯侵齊何為其不當政乎曰是命大夫之事非徴賦之事也詩曰王事一埤遺我惜乎叔孟之不講於王事也然則季氏其中軍乎而稱左師何也曰以名與孟氏而實以自與也公羊子曰五亦有中三亦有中是則二亦有中也三可毁而中不可毀故季氏之軍未嘗毁也定公十二年夏叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費左氏曰仲由為季氏宰將墮三都于是叔孫氏墮郈季孫氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北追之敗諸姑蔑二子奔齊遂墮費初郈焉正侯犯以郈叛入於齊叔孫請于齊歸乃墮之費之墮則為陽虎也陽虎囚季桓子將享于蒲圃而殺之弗克出歡陽關以叛故郈費之墮叔季自墮之成不自墮則魯莫之敢墮也公羊子曰曷為帥師墮郈帥師墮費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城于是帥師墮郈帥師墮費雉者何五板而堵五堵而雉百雉而城夫仲尼則猶取之祭仲也故仲尼以天而用人以禮而當命晉獻公始作二軍及文公被廬之搜始作三軍郤榖將中軍郤臻佐之狐偃將上軍讓於狐毛而佐之欒枝將下軍先軫佐之是三軍者亦足以霸矣清原之搜作五軍以禦狄及魯成公三年景公始作六軍其舊三軍者荀林父將中軍先縠佐之士會將上軍卻克佐之趙朔將下軍欒書佐之其新三軍者韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之賞韋之功也於是晉有十二卿成公十三年與秦戰于麻隧十六年與楚戰于鄢陵猶用四軍雖晉悼公再霸舍二軍猶用四卿綿上之搜雖輟新軍未之變也至昭項之世而六卿始専狎主夏盟其後知氏與韓趙魏四卿共滅范中行而分其地卒為三國列于諸侯故晉之分合如其國制則文景悼三公之為也故三公者教畔者也定公十三年秋晉趙鞅入于晉陽以叛左氏曰晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽邯鄲人不可趙孟怒囚邯鄲午涉賔遂殺午也以邯鄲叛趙人圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也不圍邯鄲將攻趙氏董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也趙鞅奔晉陽范中行以晉人圍之是則趙鞅未為叛也趙鞅之叛為欲富也請衛俘不與公圍邯鄲不與公入晉陽不歸于公則將誰歸乎冬晉荀寅士吉射入于朝歌以叛左氏曰范臯夷無寵于范吉射梁嬰父寵于知文子韓簡子惡荀寅魏襄子惡吉射欲以臯夷代吉射嬰父代荀寅知大子言于晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不均矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范中行氏不克遂伐公國人敗之奔朝歌荀寅士吉射則叛矣叛猶之爭卿也欲富之與欲寵孰多乎故晉陽之猶與朝歌異情而同辭蓋三郤自欒祁而後其為叛者是矣而獨以朝歌為君側則與於晉陽之過也成公十有五年秋宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏曰宋共公既葬于是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向􅙮為太宰魚府為少宰而蕩澤弱公室殺公子肥華元曰我為右師司君臣之訓今公室卑而不能正罪大而不能治敢賴寵乎乃出奔晉二華戴族也司城莊族也六官皆桓族也魚石將止華元魚府以為不可右師反必討是無桓氏也魚石曰右師反必不敢即討猶有戍在雖亡必偏乃自止華元於河上請討蕩氏華喜公孫師乃攻蕩氏殺子山魚石向為人鱗朱向􅙮魚府出舍於睢上華元亦止之不可冬十月又止之不可乃反魚府曰今不從不得入矣馳而從之則決睢澨閉門登陴矣左師二司寇二宰遂奔楚華元使向戍為左師老佐為司馬樂裔為司寇以靖國人桓族之亡則亦寵祿過也以五世之公族為四卿二大夫而猶不自戢至於卑公室殺及公子可謂衆而不寧者矣然則宋之有六卿禮與曰禮也商政與客各因其舊然則亦有三軍與曰軍出於乘乘出于甸三百十六里而出車千乘從此而降不及二軍宋之淫威則亦其澤存焉耳昭公二十有一年夏宋華亥向寧華定自陳入于宋南里以叛於是華向之族亦皆八九世矣而世執國柄鬼閻之戰華向奔陳華費遂為大司馬生華貙華多僚華登貙為少司馬多僚為御士惡之譖諸公曰貙將納亡人亟言之公不可多僚曰君若愛司馬則如亡死如可逃何逺之有公懼使人告司馬司馬嘆曰必多僚也吾有讒子而不能殺以辱君命可若何乃與公謀逐華貙華貙之徒不勝忿殺多僚劫費遂以叛召諸亡人入於南里以叛冬華登以吳師救華氏公欲出厨人濮曰吾小人可藉死不能送亡君請待之齊烏枝鳴戍宋謂曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劔從之華氏北復即之厨人濮以囊荷首而走曰得華登矣遂敗華氏于新里蓋自魚石子山以來華向之族三世再叛皆殺公族質公子十數年未已也民之貪亂寧為荼毒是之謂與昭公十一年夏楚公子棄疾帥師圍蔡左氏曰楚子城陳蔡不羹使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫若父擇臣莫若君鄭莊公城櫟而置子元焉使昭公不立齊桓公城榖而置管仲焉至今賴之臣聞五大不在邉五細不在庭親不在外羈不在內今棄疾在外鄭丹在內君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子遊齊渠丘實殺無知衛蒲戚實出獻公由是觀之則害于國末大必折尾大不掉君所知也又眀年楚公子比公子黑肱公子棄疾蔡朝吳帥陳蔡不羮許葉之師以入楚楚靈以是卒于乾溪昭公二十三年冬楚囊瓦為令尹城郢沈尹戌曰子常必亡郢苟不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城于郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待夫正其疆場修其土田險其走集親其民人眀其五候信其鄰國慎其官守守其交禮完其守備不僭不貪以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冒至于武文土不過同慎其四竟猶不城郢今土數圻而郢是城不亦難乎定公四年囊瓦敗于柏舉吳人五戰而遂入郢則以子常之貪也奪唐蔡而殺郤宛以不和其人民不然雖子胥之智無所騁之也先楚之智者其惟蒍賈乎僖公二十七年楚子將圍宋使子文治兵于睽終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉剛而無禮不可以治民過三百乘其不能以入矣苟入而賀何後之有易曰負且乘致冦至負者小人之事也乘者君子之器也以小人之事乘君子之器則盜思奪之矣魯之三家皆過三百乘而卒見奪于盜晉宋之六卿則自相盜也盜乘而盜奪之又何責焉章别章第四子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓莊公二十三年秋丹桓宫楹二十四年春王三月刻桓宫桷榖梁子曰禮天子諸侯黝堊大夫倉士黈丹楹非禮也天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮非正加於宗廟以飾夫人非正也左氏曰秋丹桓宫之楹春刻其桷皆非禮也御孫諌曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎御孫所謂大惡何也謂其亂天子之典無所章别以教民僭也雉門兩觀則亦猶是也趙文子為室斫其椽而礱之張老夕焉不謁而歸文子趨問之對曰天子之室斫其椽而礱之加密石焉諸侯礱之大夫斫之士首之備其物義也從其等禮也今子貴而忘義富而忘禮吾懼不免何敢以告文子歸令之勿礱也匠人請皆斫之文子止為後世之見之也其斫者仁者之為也其礱者不仁者之為也趙文子則庶乎章疑者矣戊寅大夫宗婦覿用幣此細事也而春秋謹識之御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告虔也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公羊子曰宗婦者何大夫之妻也榖梁子曰禮大夫不見夫人大夫國體也而行婦道惡之故謹而日之也夫大夫宗婦有異于夫人婦者乎别而又别之甚矣榖梁子之别也襄公七年冬十月衛侯使孫林父來聘左氏曰衛孫文子來聘且拜武子之言而尋孫桓子之盟也公登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無詞亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折有讓則從不讓則衡孫文子衡者也虢之會楚公子圍二人執戈先焉蔡公孫歸生與鄭罕虎見叔孫穆子穆子曰楚公子甚美不大夫矣抑君也鄭子皮曰有執戈之前吾惑之蔡子家曰蒲宫有前不亦可乎穆子曰不然天子有虎賁習武訓也諸侯有旅賁禦災害也大夫有二車備承事也士有陪乘告奔走也今大夫而設諸侯之服有其心矣夫服心之文也如龜焉灼其中必文于外若楚公子不為君必死不合諸侯矣昭公十六年韓起聘于鄭鄭伯享之子産戒曰苟有位於朝無有不恪孔張後至立于客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我孔張失位吾子之恥也子産怒曰發命之不衷出令之不信刑之頗類獄之放紛會朝之不敬使命之不聽取陵於大國罷民而無功罪及而不知僑之恥也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周于諸侯立於朝而祀于家喪祭有職受脤歸賑其祭在廟已有著位世守其業而忘其所僑焉得恥之故為禮者無它修其坊而加讓焉若此而已駟氏之後有駟秦者富而侈嬖大夫也而常陳卿之車服于其庭鄭人惡而殺之國參曰詩云不解于位民之攸塈不守其位而能久者鮮矣書曰車服以庸車服者先王所以教讓也魯哀公之末年公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶于薛孝惠娶于商自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之故疑微之際不可不别也文公二年八月丁卯大事于太廟躋僖公定公八年冬從祀先公公羊子曰從祀者何順事也文公逆祀去者三人定公順祀叛者五人言夫章疑别微之無人也文公二年夏父弗忌為宗伯尊僖公眀言曰吾見新鬼大故鬼小先大後小順也躋聖賢眀也眀順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶尚祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也及定公八年季寤公鉏極公山不狃皆不得志于季氏叔孫輒無寵于叔孫氏叔仲志不得志于魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更武伯已更懿子冬十月順祀先公而祈焉辛卯禘于僖廟然則是五叛者之為順祀也而曰叛者五人何也曰祀者非五人也祈者五人也祀則有公三卿焉而五人祈其從違曰是衆與我也然則昭公之先已祀乎曰安得不祀葬必有主主必祔于廟不廟則必自為廟也然則墓道之南不幾于别廟與曰别廟必書以煬宫武宫而猶書之亦未有置于毁廟者也以榮駕鵝之言中于忮心于主祔亦可以已也且是孟懿子則亦為政矣生事葬祭則亦嘗聞之矣孟懿子以是眀禮而五人者以是眀亂然則是大禮也而不書禘事與日何也曰略之也季孫以侵衛初歸陽虎志在于亂孟氏築室於門外其于卜日諏士皆略之矣夫徒有其舉焉而以亂終辛卯壬辰則無所置日也置日則無所置蒲囿者矣無所别之而猶以别名故聖人貴别也盍旦章第五子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之桓公元年春王正月公即位桓公二年春王正月戊申宋督弒其君與夷桓公十年春王正月桓公十八年春王正月公會齊侯于櫟公與夫人遂如齊榖梁子曰桓無王其曰王何也謹始也其曰無王何也桓弟弒兄臣弒君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉耳然則元年之王以為謹始十年之王以為舉中末年之王以為謹終與曰固也固則二百四十二年之中其無王者九十有九何也曰厯法之過也有春而以王治之亦有春而不以王治之治者頒不治者不頒亦不可知也然則其為誅弒道者何也曰雷霆之憲時當焉耳天道之不察察也使人間值之而咢然以思然則毛伯之錫文公稱王以天榮叔之錫桓公去天稱王何也曰桓有罪不討無功足録生而宥之沒而錫之謂可以省焉耳然則春秋之于王無貶與曰王也何貶之有家父求車而猶曰天王故繻葛之戰河陽之召春秋之所諱也叔帶子朝之難而王不以是去天則終無所去之矣至于王猛而後書名春秋之義蓋于是絶也然則春秋不以天治王以王治天下與曰小察者大迷體大者不細春秋之所貴者在于以霸尊王不以王與霸在于以人與楚以子命吳以地呼越也至于越而絶矣春秋之所不絶者以一日命天以一王命天下僖公九年夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘左氏曰夏會于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受齊侯雖未朝王則猶知有王也下拜登受是齊桓之正也僖公二十八年冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽公朝于王所左氏曰是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也公羊子曰曷為不言公如京師天子在是也天子在是則曷為不言天子在是不與致天子也國語曰晉文公既定襄王于郟王勞之以地辭請隧焉王弗許曰昔我先王之有天下也規方千里以為甸服以供上帝山川百神之祀以備百姓兆民之用以待不庭不虞之患其餘以均分公侯伯子男使各有寧宇以順及天地無逢其災害先王豈有賴焉內官不過九御外官不過九品足以供給神祗而已豈敢厭縱其耳目心腹以亂百度亦唯是死生之服物采章以臨長百姓而輕重布之王何異之有今天降禍災于周室余一人僅亦守府又不佞以勤叔父而班先王之大物以賞私德叔父實應且憎以非余一人余一人豈敢有愛也先民有言曰改玉改步叔父若能光昭大德更姓改物以創制天下自顯庸也而縮取備物以鎮撫百姓余一人其流辟於裔土何辭之與有若猶是姬姓也尚將列為公侯以復先王之職大物其未可改也叔父其茂昭眀德物將自至余敢以私勞變前之大章以忝天下其若先王與百姓何何政令之為也若不然叔父有地而隧焉豫安能知之文公遂不敢請受地而還文公于是若不知有王矣而猶知有王是晉文之譎也宣公三年春楚子伐陸渾之戎夏楚人侵鄭左氏曰楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休眀雖小重也其姦回昏亂雖大輕也天祚眀德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也及後楚子虔又欲求鼎于周而驟沒于乾溪故楚子可謂知欲而不知命也若宋襄公亦是也僖公十六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都周內史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大喪眀年齊有亂君將得諸侯而不終退而告人曰是隂陽之事非吉凶所生也夫是亦所謂命也莫為而為之莫致而致之亦曰修德而已矣舍德而力力則不競以退以隕亡王之後而欲爭中夏之諸侯是猶有隧鼎之心也盂之會公子魚曰禍其在此乎君欲已甚何以堪之于是楚執宋公以伐宋是命之不足以坊欲者也哀公七年夏公會吳于鄫左氏曰會于鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰昔趙鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而必曰百牢亦唯執事吳人弗聽景伯曰吳將亡矣棄天而背本不與必棄疾於我乃與之故禮以坊德刑以坊淫命以坊欲自桓文以下皆末之有也譬之盍旦其以昏號晝者也然則春秋楚子書卒不書葬惡其僭也天王之崩或志或否或葬或不葬何也曰以責魯也榖梁子聞之沈子魯人有喪周人弔周人有喪魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔是何為者也曰言夫周魯之并有喪者也周魯并有喪周通四海得以恤下弔於魯魯守一境不得以越殯弔於君謂其君親往也君皆親往而周匱矣周匱則必以喪謝諸侯故天子遣人以問諸侯諸侯不得越境以赴天子故天子有喪諸侯就其朝廟為位而哭斬衰苴杖七月而除之以功衰治三年之喪然後即吉天子葬望道而哭哭而後相弔也相弔而後治事故遇天子之崩葬而或以禮或不以禮則書不書異文變質各相副矣春秋十有二王桓襄匡簡景禮問及于諸侯魯皆為之禮自崩而葬無逸禮者春秋曰是知有王也為之書王猶之書禮也平惠定靈志崩不志葬其葬禮則已泯矣葬禮之泯自隱公始也隱公三年春三月庚戌天王崩秋武氏子來求賻求賻則且葬也已七月矣而魯賻不至不得曰討而得曰求求而得之亦不得曰禮也故平王崩而不葬僖公八年冬十有二月丁未天王崩九年夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘是七月矣宰不得涖事于周則諸侯不得就哭于位聞其日矣致壇而哀哀而後行事不然不書故惠王崩而不葬謂有盟主存焉責盟主而不責魯成公五年冬十有一月己酉天王崩六年秋仲孫蔑叔孫僑如帥師侵宋襄公二十有八年冬十有二月甲寅天王崩眀年夏秋以晉命城杞是皆責盟主也然而伐宋城杞未害于致葬禮也則魯與有過焉曰先後之異時也魯不得盡禮焉魯不得盡禮則桓王之七載猶且書之故曰魯與有過也然則魯如之何曰魯即不奔王喪猶以衰墨守於周公之廟莊公十二年莊王崩春王三月紀叔姬之歸則猶書王也以王表月而不以崩表王于是夏四月無事奈何其無天王之事也夫獨為責王者乎春秋無責王者也莊公十七年僖王崩五年之間有兩王喪霸役未起戎慝未作宗國輯寧京師晏然于是四時無事有它國之細事焉何為其無天王之大事也文公十四年頃王崩春秋三沒王不廢王月王月則不廢王崩則廢之謂是佚簡也于是則我多事矣春伐邾夏盟于新城秋至自會冬齊執單伯然猶未可以廢天王之事也故春秋之責魯莊公甚于其責文公也詩人之誦魯莊公甚于其誦齊襄公也父子之道衰則君臣之誼絶猶之月見于晝則書日可廢也書日不可廢亦無所見日矣然則楚赴晉喪又執楚喪而不可以奔天王之喪何也曰未之聞也支子出封于外非王命不赴京師朝聘以時值有大故從事于羣公之後奔喪之禮則未之學也列國聞喪則卿士大夫書之矣卿士大夫奔走於蜃翣之下則未之敢書也執紼之及晉桃茢之及楚則不得己也然則諸侯之歸楚如何曰六王二公則楚已擇取之矣鄭蔡陳許不乘其車者則猶在諸侯之位也猶在諸侯之位則王之如何曰舉子男見公之禮就降階焉而已滅國之後託于臣妾則典籍去之矣定公四年三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚十四年二月楚公子結滅頓十五年二月辛丑楚子滅胡哀公四年夏晉人執戎蠻子赤歸于楚是去召陵之會甫踰十載而盟主叛盟歸命江漢何也曰韓魏趙氏將分公室而釋憾于楚以弱天下之諸侯左氏傳曰楚人既克夷虎乃謀北方左司馬昄申公夀餘葉公諸梁致蔡于負函致方城之外于繒關曰吳將泝江入郢將奔命焉為一昔之朝襲梁及霍單浮餘圍戎蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍于莬和右師軍于倉野使謂隂地大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通于少習以聽命士蔑請諸趙孟趙孟曰晉國未寧焉能惡楚必速與之士蔑乃致九州之戎將裂田與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬眅致邑立宗焉誘其遺民盡俘以歸晉之不競則不自是始也自厥憖之會始也厥憖之會八國救蔡不逺而歸以為荀范不睦內變方蘊守士燮之智以待楚斃無責焉耳於是趙孟為政韓魏從之而效楚之趣誘人之君以歸命于楚夫非竊國之盜而誰復為之乎榖梁子曰其言歸于楚何曰辟伯晉而京師楚也京師楚則遂王楚矣蓋中國之王楚自是始也昭公十一年夏四月丁巳楚子虔誘蔡侯般殺之于申十六年春楚子誘戎蠻子殺之是蓋稱誘也晉誘蠻子赤而不曰誘何也曰歸重於執執重於誘舉重焉耳然則不書趙鞅士蔑而曰晉人何也曰歸楚者非獨趙鞅也非獨趙鞅則將盡列國而人之何獨晉人也故趙鞅者所謂盍旦之鳥也然則召陵始會齊桓公不郤江黃亦不救江黃召陵終會趙孟不郤胡頓亦不救胡頓夫猶有霸者之意乎曰是荀寅之意也荀寅死而後趙孟用事趙孟之誘執蠻子甚於荀寅之取貨于蔡也取貨于蔡而中國叛誘執蠻子而蕃服叛中國與蕃服皆叛而楚始坐王楚坐王而三晉始分故春秋誅楚之意則將盡於此也然則晉納蠻子而楚破武關以取隂地晉將如何曰楚之畏吳猶晉之畏楚也吳能以柏舉入郢楚不能以少習入晉然且君子不以勢易德不以險易信哀公六年秋七月庚寅楚子軫卒左氏曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰楚子有疾庚寅攻大冥卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也與子西子期謀潛師閉塗立越女之子章而後還是嵗也有雲如衆赤鳥夾曰以飛三日楚子使問于周太史周太史曰其當王身乎若禜之可移于令尹司馬楚子曰除腹心之疾以置諸股肱何益不榖不有大過天其天諸有罪受罰又焉移之遂弗禜也初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂弗祭孔子曰楚子知天道矣其不失國也宜哉夏書曰維彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由己率常可矣夫夫子亦與楚子乎夫子之與楚子謂楚之不郊也楚之不郊猶盜藏而舍其帷幕也杞宋魯之郊猶主饋之用祭器也然則赤鳥夾日之祥何也曰是月也其周正申酉七八月之間乎日在於翼軫鶉尾之墟赤眚從之其國有火亦有大喪爰及大兵于是吳入楚楚子殁于城父則謂是占也然則齊景夢與二日搏而不勝不謂吳楚乎曰齊景之夢不如吕錡之式也夫齊景者亦猶之盍旦者也逺害章第六子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君隱公十年夏翬帥師會齊人鄭人伐宋左氏曰先期也公羊子曰此公子翬也何以不稱公子貶曷為貶隱之罪人也故終隱之篇貶也先是四年秋書翬帥師左氏曰疾之也貶之疾之桓三年秋公子翬如齊逆女則不去其公子何也以隱而疾之疾其仇以桓而親之親其故夫以公子而逆女異于公子而同車者乎甚矣魯之不嫌也不嫌不嚴故周公之後以內篡多聞莊公三十二年秋七月癸巳公子牙卒公羊子曰何以不稱弟殺也殺則曷為不言刺為季子諱殺也曷為為季子諱殺季子之遏惡也不以國獄緣季子之心而為之諱季子之遏惡奈何莊公病將死以病召季子季子至而授之以國政曰寡人即不起將焉致魯國季子曰般也存君何憂焉公曰容得是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成季子和藥而飲之曰公子從吾言而飲此可以無為天下戮笑必有後于魯國牙從其言而飲之無傫氏至于王堤而死八月癸亥公薨於路寢冬十月己未子般卒公子慶父如齊閔公元年春王正月公羊子曰公何以不言即位繼弒君不言即位孰繼繼子般也孰弒子般慶父也殺公子牙今將爾季子不免慶父弒君何以不誅將而不免遏惡也既而不可及獄有所歸不探其情親親之道也惡乎歸獄歸獄於僕人鄧扈樂鄧扈樂者即左氏所謂圉人犖也甚哉公羊子之恕也獄有所歸而首禍者可免乎夫季友不能誅兩公子也季友不能誅兩公子而春秋兩釋之一曰公子牙二曰公子慶父何也曰弒者之不去其公子也以為藉也曰微公子不弒矣至於公子牙聖人猶有輕典曰已服之矣具其時日若可告於廟者然是周法所宥同姓也文公十有八年秋公子遂叔孫得臣如齊冬十月子卒夫人薑氏歸子齊季孫行父如齊左氏曰文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲欲立之惠伯不可仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之惠伯曰死君命可也公冉務人曰若君命可死非君命何聽惠伯弗止乃入仲殺而埋之馬矢之中是仲也殺一君一公子一大夫而春秋書之若無害于國者又何以正天下曰春秋亦有所諱也春秋不諱齊莒而納魯君臣于齊莒之中夏五月戊戌齊人弒其君商人冬莒弒其君庶其夫以公子遂叔孫得臣為異于邴歜閻職者乎抑以季孫行父為異於莒太子僕者乎行父之異于莒僕則有以自白也遂得臣之異于歜職則無以自白也聖人謂吾不樂以子赤與商人庶其同視也使遂得臣行父與齊莒同視焉是亦行父之所深耻也然則罪行父者何也以季友之所罪子牙者罪襄仲則不得以季友之所恕慶父者恕行父也宣公八年夏六月辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥公羊子曰仲遂者何公子遂也何以不稱公子貶曷貶為弒子赤貶然則曷為不於弒焉貶于文則無罪于子則無年榖梁子曰為若反命而後卒也此公子也其曰仲何也疏之也何為疏之是不卒者也不疏則無用見其不卒也其卒之何也以譏乎桓也其譏桓何曰聞大夫之喪則去樂卒事夫榖梁子則未聞夫奚斯子産之誼也共仲未死而奚斯哭之子晳未死而子産數之令其速死仲遂之反于黃是可數矣惜乎魯之無子産也然則弒君之坊専為同姓者乎曰春秋之貴者則皆同姓也曰是専為魯發乎曰列國諸侯有弒其君者曰薨曰卒或地或不地則必以魯為詞魯之六世弒兩君兩子則與齊楚比烈也或曰是為公孫無知楚子干子晢發與齊僖公之母弟曰夷仲年生公孫無知有寵于僖公衣服禮秩如嫡襄公絀之無知遂作亂弒襄公楚子審無冡嫡有寵子五人無適立焉乃遍以璧見於羣望與巴姬埋璧于太室之庭使五人齊齒而入拜子昭跨之虔肘加焉子干子晳逺之棄疾抱而入拜皆當璧楚子不定故自子昭而下遞相弒也然則誰始為之其晉獻公乎獻公之初未廢申生也使士蒍為重耳夷吾築蒲與屈不慎置薪焉公使讓之士蒍稽首對曰臣聞之無喪而戚憂必讎焉無戎而城讎必保焉寇讎之保又何慎焉詩云懷德惟寧宗子維城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘尨茸一國三公吾誰適從至於奚齊卓子而為公者衆矣故同姓之别不可不慎也以齊桓公之眀管仲之賢也不能立一公子卒幾不得殯殯幾不得葬禍亂相尋自武孟而後孝昭懿惠五世而後定亦惟是輿服相似以嫡齒年之故也然則事有近於此者乎曰有之是在臧武仲之立季悼子也季武子欲立悼子以公彌之長也不敢主問於臧武仲武仲曰吾能立之乃請諸大夫遍獻客命重席新樽降階而逆悼子及旅獻乃召公彌與之齒武仲以是見愛于季氏見斥于國人然幸也而不至於弒楚昭王之奔隨也子西為王輿服以保路國於脾泄聞王所在而後從王及由余之城麋也子西問大小髙厚焉由余皆曰不知子西怒曰不能如辭城之不知又何知焉由余曰固辭之矣而吾使也人各有能有不能王遇盜于雲中豫受其戈其所猶在袒而示之背曰此豫所能也若脾泄之事豫亦弗能也故為假輿服以弭亂者猶假輿服以招寵也臧紇假樽席以亂嫡庶之序子西假輿服以乘危亂之釁是仲尼之所深鄙也詩曰鳲鳩在桑其子七兮淑人君子其儀一兮一者有上下之謂也人浮於食章第七子云君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮於人也寧使人浮於食桓公十有一年秋九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛鄭忽者鄭昭公也為鄭世子突者何厲公也宋人欲立厲公執祭仲而逐忽忽不能讓又不能遂卒以廢死君子傷之左氏曰我公之未昏于齊也齊侯欲以文薑妻鄭太子忽太子忽辭人問其故太子曰人各有耦齊大非耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又欲妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯方子忽之辭也祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從而卒以失國齊人所刺狡童也桓公十七年髙渠彌弒昭公而立公子亹其眀年夏四月丙子公薨于齊丁酉公之喪至自齊夫與其亂而離于禮毋寧禮而離于亂乎以鄭昭公之賢也失援而為世所詆譏是慶父襄仲所歸命于齊定哀所入楚入越也將謂求繫得繫者之可謂智乎襄公二十二年九月鄭公孫黑肱有疾歸邑于公召室老宗人立假而使黜官薄祭祭以特羊殷以少牢足以共祀盡歸其餘邑曰吾聞之生于亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善哉詩曰慎爾侯度用戒不虞鄭子張有焉楚之殺子南也以觀起之富也薳子馮復為令尹有寵于子馮者八人皆無祿而多焉他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我于朝吾懼不敢不見吾過子姑告我何疾我也對曰吾懼不免焉何故對曰昔觀起有寵于子南子南得罪觀起車裂何故不懼薳子自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也愛我者如夫子則可不然請止辭八人者而後王安之崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘及慶氏亡皆召之具器用而反其邑焉與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也民生厚而用利於是正德以幅之使無黜嫚謂之幅利利過則敗吾不敢貪多所謂幅也于是子雅從之辭多受少子尾受而稍致之公公以為忠襄公二十七年衛殺其大夫寧喜衛侯之弟鱄出奔晉左氏曰衛寧喜専公患之公孫免餘請殺之公曰微寧子不及此吾與之盟矣事未可知祗成惡召止也公孫免餘請私討之敗又攻寧氏殺之子鮮曰逐我者出納我者死不亦難乎且鱄實使之遂出奔晉公使止之不可託於木門不鄉衛國而坐公賞免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半使為卿辭曰大叔儀不二能贊大事君其命之乃使文子為卿故辭貴受賤辭富受貧公孫免餘有焉夫公孫免餘聞之晏子者乎抑聞之管子者乎僖公十二年管夷吾平戎於王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲乃受下卿之禮而還故管子晏子則可以弭亂矣榖梁子曰専喜之徒也専為喜之徒何也已雖急納其兄與人之臣謀弒其君是亦弒君者也其曰弟何也専有是信者君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛公羊子曰寧氏之將再納獻公也公必使公子鱄約之公子鱄不可獻公怒以鱄與逐已也不得已而約之已約歸殺寧喜公子鱄乃挈妻子而去之將濟于河盟曰所履衛地食衛粟者昧雉彼視然則子鮮之誼謂近於叔肸者乎謂近於季札者乎三公子者皆織屨灌園自食其食然而叔肸不與于亂子札遺亂子鮮則與於亂也夫子鮮其猶之公冶者與襄公二十九年夏五月公至自楚左氏曰公還及方城季氏取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祇見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之乃受公欲無入榮成伯賦式微乃入公冶致其邑于季氏終不入季氏家曰欺其君何必使豫季孫見之則言季氏不見德則不言季氏及疾聚其臣曰我死必無以冕服斂非賞也且無使季氏葬我故如公孫免餘公子鮮公冶者亦可謂人浮于食矣貴讓章第八子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君詩云民之無良相怨一方受爵不讓至于已斯亡僖公二十五年晉侯朝王不書謂其請隧也公問元帥於趙衰對曰郤縠可行年五十矣守學彌惇夫先王之法志德義之府也德義生民之本也能惇篤者不忘百姓也請使郤縠公從之公使趙衰為鄉辭曰欒枝貞慎先軫有謀胥臣多聞皆可以為輔臣弗若也乃使欒枝將下軍先軫佐之郤縠卒先軫代之胥臣佐下軍既又使趙衰為卿辭曰夫三德者偃之出也以德紀民其章大矣不可廢也使狐偃為卿辭曰毛之知賢於臣其齒又長毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之狐毛卒又使趙衰代之辭曰城濮之役先且居之佐君也善軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在乃使先且居將上軍公曰趙衰三讓其所讓者皆社稷之衛也廢讓是廢德也以趙衰之故搜於清原作五軍使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之故晉臣多讓則趙文子之教也虞書曰溫恭克讓又曰汝唯不伐汝唯不矜其趙文子之謂與成公十三年三月公如京師公羊子曰鑿行也鑿行奈何不敢過天子也然則必朝王矣而不曰朝王何也略之也諸侯之志在於伐秦鑿而入之非合也公將朝叔孫僑如先聘且告見王孫説與之語説言於王曰魯叔孫之來也必有異焉其幣薄而言諂殆請之也若請之必欲賜也且其狀方上而鋭下宜觸冒人王其勿賜聖人之施舍也議之其喜怒取與也議之不主寬惠不主猛毅德義而已王私問諸魯果請之也王遂不賜禮如行人及魯侯至仲孫蔑為介王孫説與之語好讓王厚賂之故曰讓賢於請先是僖公三十二年秦師將襲鄭過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師必有謫王曰何故對曰師輕而驕輕則寡謀驕則無禮無禮則脫寡謀自陷入險而脫能無敗乎既而師敗於殽是讓之賢於勇也晉既克楚于鄢使郤至告慶于周見召桓公與之語以晉國之克也已實謀之微我晉不戰矣欒范不欲我則強之戰而勝是吾力也吾有三伐必佐新軍而升為政單襄公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其蓋人也夫人性貴陵上者也不可蓋也求蓋人其抑下滋甚故聖人讓且諺曰獸惡其網民惡其上書曰民可近也而不可上也在禮敵必三讓聖人知民之不可加也故王天下者必先諸民今至在七人之下而欲上之是求蓋七人也其亦有七怨怨在小醜猶不可堪况侈卿乎其何以待之晉之克也天有惡于楚也故警之以晉而郤至佻天以為已力不亦難乎以吾觀之兵在其頸不可久也眀年郤至歸不免于難受爵不讓卻至之謂也襄公十三年晉荀罃士魴卒晉侯搜于綿上以治兵使士丐將中軍辭曰伯遊長昔臣習于知伯是以佐之非能賢也請從伯遊于是荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之于是趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率卒乘以從于下軍禮也君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也其貴讓之謂乎然則晉之讓孰始之曰自趙姬杜祁始之趙姬適文子生三子請迎叔隗子餘辭姬曰得寵而忘舊何以使人固請許之叔隗與盾來姬以盾為才固請於公以為嫡子而同括嬰下之以叔隗為內子而已下之杜祁者文公之次妃以逼姞有子讓逼姞而上之及季隗來又讓季隗故班在四是生公子雍故晉人之讓亦文公之教也而教先自內毋亦鑒于驪氏之禍乎靡笄之役郤獻子師勝而反范文子後入武子曰燮乎女知吾望女也乎對曰夫師郤子之師也其事臧若先則恐國人之屬耳目於我也故不敢武子曰吾知免夫既見于公公謂郤獻子曰子之力也夫對曰克也以君命命三軍之士三軍之士用命克也何力之有范文子見公曰子之力也夫對曰燮也受命於中軍以命上軍之士上軍之士用命燮也何力之有欒武子見公曰子之力也夫對曰書也受命於上軍以命下軍之士下軍之士用命書也何力之有焉甚矣晉軍之和也非讓無和蓋自鄢陵而衰矣綿上再霸則晉悼公之力也微晉悼公雖范宣子無以率其下襄公二十四年晉平公嬖程鄭使佐下軍鄭行人公孫揮如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然眀然眀曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉夫既登而求降階者知人也不在程鄭非死必亡甚矣子羽之訥也為階者所以教讓也閔子之頌曰念兹皇祖陟降庭止又曰紹庭上下陟降厥家又曰無曰高高在上陟降厥士日監在兹是周成王之讓也昭公十年夏齊欒施來奔左氏曰齊惠欒髙氏皆嗜酒信內多怨強于陳鮑氏而惡之陳鮑方睦遂伐欒髙氏欒施髙強來奔陳鮑分其室晏子謂桓子必致諸公讓德之本也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也蘊利生孽姑使無蘊乎可以滋長桓子盡致於公而請老於莒召子山子商子周而反其邑反子城子公公孫捷而皆益其祿國之貧約孤寡者私與之粟故晏子之讓分於桓子桓子之有齊國亦晏子之教也晉人之執季文子也既歸聲伯往謝之郤犨欲與之邑弗受也歸鮑國謂之曰子何辭苦成叔之邑欲信讓耶抑知其不可乎對曰吾聞之不厚其棟不能任重重莫如國棟莫如德夫苦成叔家欲任兩國而無大德其不存也亡無日矣譬之如疾豫恐易焉苦成氏有三亡少德而多寵位下而欲上政無大功而欲大祿皆怨府也其君驕而多私勝敵而歸必立新家立新家不因民不能去舊因民非多怨無所始為怨三府可為多矣其身之不定安能定人鮑國曰信夫吾信不若子鮑氏有釁吾不圖矣今子圖逺以讓邑必常立矣故聲伯者魯之良也以讓故寡怨作讓章第九子云君子貴人而賤已先人而後已則民作讓故稱人之君曰君自稱其君曰寡君昭公十有三年秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘公不與􅉀晉人執季孫意如以歸公至自晉冬十月公如晉至河乃復十有四年春意如至自晉左氏曰尊晉罪已也尊晉罪已禮也夫所謂貴人賤已者也已則不競而侵凌邾莒使瘠牛僨于孤豚蒙幕之咎意如自取之然而義不及公也義不及公而數欲止公何也侵莒如楚者季孫之謀也晉既輕公則公必重季氏使晉執季氏而季氏愈得以操重於公終公之身五絀於晉而卒歸于季氏者取鄆二楚之謀也然當成公時亦五絀於晉而權不在季氏者何曰穆伯之纍諸侯之所知也至於昭而衰矣以周公之孫車賦八百乘奔走晉楚或止或復若無異於臣妾者則亦無貴作讓矣鄭賦六百子産子皮相繼為晉而趙孟范獻不敢越其宫庭故貴人而賤已者文詞之事也先人而後已者威儀之事也必以力政尊命鎮撫其社稷則非自強不可矣詩曰無競維人四方其訓之貴人賤已亦不可以終訓之道也晉綿上之搜新軍乏帥悼公欲使張老為卿辭曰臣不如魏絳夫綘之智能治大官其仁可以利公室不忘其勇不疚於刑其學不廢先人之職若在卿位內外必平且雞丘之會其官不犯而辭順不可不賞也公五命之固辭乃使佐魏絳于新軍又辭以為軍司馬故如張老可謂先人而後已者矣叔孫婼之聘於宋也桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡禮貴人而賤已昭子曰貴其身而後能及人何也言夫貴已則不敢賤人者也以貴處人則人亦貴已以賤處人則已乃愈賤矣惜乎意如之賤邾人而愈以賤其身賤其身而徒以尊晉人也韓獻子老使公族穆子受事於朝辭曰厲公之亂無忌傋公族不能死臣聞之曰無功庸者不敢居髙位今無忌知不能匡君使至於難仁不能救勇不能死敢辱君朝以忝韓宗請退也固辭不立悼公聞之曰難雖不能死君而能讓不可不賞也使掌公族大夫如韓無忌可謂善稱人過稱已者矣然而難乎其為過也過及通國可謂貴人而賤已者矣襄公九年秦景公使士雅乞師於楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓于善其大夫不失守其士競于教其庶人力于農穡商工皂𨽻不知遷業韓厥老矣知罃稟焉而以為政范丐少于中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏綘多功以趙武為賢而為之佐君眀臣忠上讓下競當是時也晉不可敵事之而後可以楚之競也而不敢以競敵讓故道有賤已而已愈貴後已而已愈先者讓是也襄公二十七年夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人於宋傳曰宋之會晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之􅉀久矣豈専在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸􅉀也子務德毋爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉故後之而得先宋之會是也虢之會則亦由此也僖公二十六年夏齊人伐我北鄙左氏曰齊孝公伐我北鄙公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玊趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎曰小人恐矣君子則否齊侯曰室如懸磬野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之􅉀曰世世子孫無相害也載在􅉀府太師職之桓公是以糾合諸侯而謀其不協彌縫其缺而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然齊侯乃還甚矣展季之順也稱而不諛直而不犯後而先賤而貴夫子所云其蓋謂此也夫先君之思蓋亦讓者之通辭也僖公二十八年冬曹伯襄復歸于曹遂會諸侯圍許左氏曰丁丑諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史以曹為解曰齊桓為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也夫猶有先君之思焉或曰是子臧之辭也作讓之誼子臧有焉昭公二年夏叔弓如晉叔弓聘于晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賔徹命于執事敝邑宏矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有德夫子近德矣襄公八年晉侯使士丐來聘左氏曰晉范宣子來聘且拜公之辱告將用師于鄭公享之宣子賦摽有梅季武子曰誰敢哉譬諸草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮可託章第十子云利祿先死者而後生者則民不偝先亡者而後存者則民可以託詩云先君之思以畜寡人以此坊民民猶偝死而號無告隱公八年三月鄭伯使宛來歸祊左氏曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也夫是謂思先君者乎庚寅我入祊公羊子曰宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事于泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉其言入何難也其曰何亦難也其言我何言我者非獨我也齊亦欲之夫皆為利己而欲之則偝死而市生者衆矣桓公元年三月鄭伯以璧假許田左氏曰公即位修好於鄭鄭人請復祀周公卒易許田公許之三月鄭伯以璧假許田為周公祊故也穀梁子曰假不言以以非假也非假而曰假諱易地也禮天子在上諸侯不得以地相與也無田則無許可知矣不言許不與許也許田者魯朝宿之邑也邴者鄭伯之所受命祭泰山之邑也用見魯之不朝於周而鄭之不祀泰山也然則鄭將偝生而魯將偝死乎天子周公者諸侯所不得生死之也鄭偝天子而使魯偝周公是鄭伯之志也故鄭伯之不然以璧假田雖鄭人之可也是非以璧假田者也假魯云耳假魯則可以載矣故鄭以繻葛戰於天子桓公十一年秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛左氏曰初祭封人仲足有寵于莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女于鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之祭仲之不可託也忘其君而惜其身誘於人而亂人之國如祭仲者其亦有思乎公羊子曰權之所設舍死亡無所設行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也祭仲偝死而自生偝亡而自存而公羊子然之何也曰探祭仲之思欲終與忽也而祭仲不能故祭仲猶之傅瑕也不如荀息石碏之正也僖公十年春晉里克弒其君卓及其大夫荀息左氏曰初獻公之殺世子申生也使荀息傅奚齊公疾召苟息曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其服肱之力加之以忠貞其濟君之靈也不濟則以死繼之及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎冬十月里克殺奚齊于次荀息將死之人曰不如立卓子而輔之荀息立卓子十一月里克又殺卓子荀息死之故里克之可託不如荀息之可託也桓公十一年秋公會宋公于夫鍾冬十二月公會宋公于闞十二年公會宋公于虛冬十一月公會宋公于龜丙戌公會鄭伯盟于武父十二月及鄭師伐宋戰于宋十三年二月公會紀侯鄭伯及齊侯宋公衛人燕人戰齊師宋師衛師燕師敗績十四年春正月公會鄭伯于曹夏五月鄭伯使其弟語來􅉀宋鄭之履何其錯也公之意皆與突而去忽去順而與逆無所罪之皆為偝死而號無告然則其獨與宋何也宋既賂魯則鄭必賂宋郜鼎之耗償于盧門魯無知焉耳僖公十五年十有一月壬戌晉侯及秦伯戰于韓獲晉侯左氏曰晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆偝之賂秦以河外五城東盡虢略南及華山內及解梁城既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉是以敗于韓原天下之不可託有如晉惠公者僖公二十八年春晉侯伐衛衛侯出奔楚六月衛侯鄭自楚復歸于衛衛元咺出奔晉冬晉人執衛侯歸之于京師衛元咺自晉復歸于衛三十年秋衛殺其大夫元咺及公子瑕衛侯鄭歸于衛公羊子曰衛之禍文公為之也文公為之奈何文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也然則春秋與衛侯乎曰衛侯出曰奔楚入曰自楚復歸何為與衛侯也曰與叔武乎曰不見叔武何為其與叔武也曰與元咺乎曰舉國殺之何為其與元咺也曰罪元咺乎曰不去其大夫終始曰衛曷為其罪之也然則其文錯然何也曰痛夫天下之先生而後死先存而後亡者衆也雖伯武亦未之免也其出也不哀其入也不迓為晉所立而無復兄之心但曰有君矣使晉無所急於凡藉衛而以反以是為智者是春秋所痛也若宋目夷之守宋鄭公子班之謀鄭是也晉人之迎公子雍也穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此出朝則抱以適趙氏頓首于宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患之乃背先蔑而立靈公以禦秦師先蔑奔秦士會從之方先蔑之使也荀林父止之曰太子猶在而外求君此必不行子以疾辭若何弗聽為賦板之三章又弗聽及亡荀伯盡送其帑及其器用於秦故如荀林父可以託矣趙盾幸而不為襄仲也幾使穆嬴哭而過市宣公十八年冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊左氏曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言於朝曰使我殺嫡立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔奔書曰歸父還自晉善之也公羊子曰還者何善辭也何善爾歸父使于晉還自晉至柳聞君薧家遣墠帷哭君成踊反命乎介自是走之齊夫以季孫行父居君之喪哭未就位弔未及賔而厲言以討仲氏是將討君乎抑以自討也穀梁子曰與人之子守父之殯捐殯而奔其父之使者是亦奔父也故偝死而號無告者季文子之逐公孫歸父是也襄公二年夏五月庚寅夫人薑氏薨成薑也左氏曰齊薑薧初穆薑使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其維哲人告之話言順德之行季孫於是為不哲矣且薑氏君之妣也曰為酒為醴蒸畀祖妣以洽百禮季孫何禮之有襄公四年秋七月戊子夫人姒氏薨左氏曰秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為己樹六檟于蒲圃東門之外匠慶請木季孫曰略諸匠慶用蒲圃之檟季孫不御君子曰多行無禮必自及也夫季孫所謂先生而後死先存而後亡者乎然則穆薑之誼未絶乎曰文薑則亦未絶也穆薑何絶之有然則定姒不殯于廟無櫬不虞而稱夫人何也曰無櫬不虞者是行父之志非先君寡人之志也於是知魯之不與文子也偝死而號無告是君子之所鄙也襄公二十三年秋八月己卯仲孫速卒冬十月乙亥臧孫紇出奔邾左氏曰季武子無適子公彌長而悼子愛訪於申豐曰彌與紇吾皆愛之欲擇才而立之申豐不對歸將盡室而行他日又訪焉對曰若然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏乃飲大夫酒臧紇為客既獻臧孫命北面重席新鐏潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色乃以公鉏為馬正愠而不出閔子馬見公鉏曰子無然禍福無門唯人所召為人子者患不孝不患無所敬恭父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃又出為公左宰季氏以是愛臧孫而孟孫惡之孟孫之御豐點謂公鉏曰孟氏未有後苟立羯也請讎臧氏孟莊子疾公鉏以羯請於季孫弗應己卯孟孫卒公鉏奉羯立于户側季孫入哭而出曰孺子秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我美疢也孟孫之惡我藥石也美疢不如惡石石猶生我疢之美其毒滋多孟孫死吾亡無日矣冬十月孟孫且葬孟氏之徒告季孫曰臧氏不使我葬將為亂臧氏聞戒甲而助除季孫覘之信逆攻臧氏臧紇斬鹿門之關而出據防而求立後魯人􅉀之曰毋如東門遂不聽公命殺適立庶又曰毋如叔孫僑如欲廢國常蕩覆公室季孫曰皆不至此乃盟臧氏曰毋或如臧孫紇干國之紀犯門斬關夫臧紇之罪則亦偝死而號無告也死孟孫而走孺子秩猶以多涕眀智也是臧孫之思也酌言章第十一子云有國家者貴人而賤祿則民興讓尚技而賤車則民興藝故君子酌言小人先言舊本作約言子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也故君子信讓以涖百姓則民之報禮重詩云先民有言詢于芻蕘舊凡二節文公六年晉殺其大夫陽處父晉射姑出奔狄榖梁子曰稱國以殺罪纍上也襄公已葬其以纍上之辭言之何也君漏言也上漏則下暗下暗則上聾且暗且聾無以相通夜姑殺者也夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰始吾使盾佐女今女佐盾矣夜姑曰敬諾襄公死處父主竟上事夜姑使人殺之君漏言也故士造辟而言詭辭而出曰用我則可不用我則無亂其德是不如左氏之核也然而可以戒上不酌民言又從而吐之則彥聖有技者無由而至矣宣公九年冬陳殺其大夫泄冶榖梁子曰稱國以殺其大夫殺無罪也泄冶諫于陳靈公曰使國人聞之則猶可使仁人聞之則不可君愧而殺之或以為孔寧儀行父殺之則亦公殺之也夫上之酌民言非以興讓亦以去亂耳上下不言國已亂矣而猶云教讓則是以亂讓也成公五年夏梁山崩晉侯以傳召伯宗道遇重者伯宗辟之重人曰辟我不如徑之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川山崩川竭則君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉如此而已雖伯宗若之何伯宗請見之不可如其言而河流孔子聞之曰伯宗其攘善乎夫伯宗則猶之酌言者也悼夫人食輿人之城杞者絳縣人年長矣無子而往與於食有與疑年問之曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問於朝師曠曰魯叔仲惠伯會郤成子於承筐之嵗也今七十有三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬矣趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才使助為政辭以老使為君復陶為絳縣師而廢其輿尉魯使者歸告季武子曰晉未可偷也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君朝多君子其可偷乎勉事之而後可故趙武酌言而魯國益恭酌言之興讓亦謂此也左氏曰子産之從政也擇能而使之馮簡子能斷大事子太叔美秀而文公孫揮能知四國之為辨大夫之族姓班位貴賤能否又善於辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子太叔使行之是以鮮有敗事故子産所謂酌言下天上施者也下天土施者何也雲出於山而施于天霖雨由之滋尺生尺仲尼之所貴也鄭人遊於學校以論執政然眀謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨作威防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道吾將聞而藥之也然眀曰蔑也今而後知吾子之信可事也夫子産者則猶酌召穆公之言也當厲王時使衛巫監謗以告則殺之國人莫敢言道路以目王喜告召公召公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之故為川者決之使𨗳為民者宣之使言故天子聽政使公卿至於列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諌庶人傳語近臣盡規親戚補察師史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用於是乎出猶其有原濕衍沃也衣食于是乎生口之宣言也行善而傋敗所以阜財用衣食者也民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何故仲尼所謂酌言亦取於此也然眀取之而以壅為嘗不然叔向亦無所得於然眀也楚子虔畏子張之驟諌也謂史老曰吾欲已子張之諌若何對曰用之實難已之易矣若諫君則曰余左執鬼中右執殤宫凡百針諫吾具聞之矣寧聞它言白公又諫王如史老之言拒之白公曰昔殷武丁能聳其德至於神明以入于河自河徂亳於是乎三年默以思道卿士患之曰王言以出令也若不言是無所稟令也武丁於是作書曰以余正四方余恐德之不類兹不言由是以象夢求四方之賢聖得傅説以升為公而使朝夕規諌曰若金用汝作礪若津水用女作舟若天旱用女作霖雨啓乃心沃朕心若藥不暝眩厥疾不瘳若跣不視地厥足用傷若武丁之神明也其聖之睿廣也其知之不疚也猶自謂未艾故三年默以思道既得道猶不敢専制使以象旁求聖人既得以為輔又恐其荒失遺忘故使朝夕規誨曰必交修豫無豫棄也今君或者未及武丁而惡規諌者不亦難乎齊桓晉文皆非嗣也還軫諸侯不敢淫逸心類德音以得有國近臣諌逺臣謗輿人誦以自誥也是以其入也不過一同而至於有畿甸以屬諸侯至于今為令君君不度憂於二令君而欲自逸也毋乃不可乎周詩有之曰弗躬弗親庶民弗信臣懼民之不信君也故不敢不言不然何急以言取辜也王病之曰子復語不穀雖不能用吾憖置之於耳對曰賴君之用也故言不然巴浦之犀犛兕象其可盡乎而又以規為瑱也遂趨而退歸杜門不出七月而有乾溪之亂故上不酌民言則視之乾溪矣乾溪者芻蕘之窮也然則貴人而賤祿尚技而賤車何謂也曰車祿者所以勸言也虞書曰敷奏以言眀試以功車服以庸卷阿之詩曰君子之車既庶且多君子之馬既間且馳矢詩不多惟以遂歌言夫上酌民言而慶賞式序者也讓善章第十二子云善則稱人過則稱已則民不爭善則稱人過則稱已則怨益亡詩云爾卜爾筮體無咎言子云善則稱人過則稱已則民讓善詩云考卜維王宅是鎬京惟龜正之武王成之舊凡二節隱公五年春公矢魚于棠冬十有二月辛巳公子彄卒會戎則不日不月謂無王也矢魚亦不日不月矢魚亦無王乎曰非禮也非禮則近於無王也然則隱公不命大夫而謹日月於公子彄何也曰春秋之貴讓善也貴引過也所以勸民而興行也左氏曰公將如棠觀魚者臧僖伯諌曰不可凡物不足以講大事其材不足以傋器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春搜夏苖秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章眀貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮草齒牙骨角毛羽不登于器則公不射古之制也若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從冬十二月辛巳臧僖伯卒公曰叔父有憾于寡人寡人弗敢忘葬之加一等生不酌其言沒而禮之無益也雖然公猶未忘善也猶未忘過也進其道也亦可以勸僖公三十三年春王二月秦人入滑夏四月辛巳晉人及薑戎敗秦師于殽先年冬晉侯重耳卒杞子將叛晉使告於秦晉人卜之曰將有西師擊之必捷焉方秦之伐晉喪也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主傋之其誰不知公辭焉召孟眀西乞白乙師出於東門之外蹇叔哭之曰孟子吾見師之出不見其入也公使謂之曰爾何知爾墓之木拱矣蹇叔又哭而送其子曰晉人禦師必于殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收爾骨焉及滅滑將還先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之有遂興薑戎敗秦師于殽獲百里孟眀視西乞術白乙丙以歸遂墨以葬文公文嬴請三帥而復之秦伯素服郊次嚮師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟眀孤之過也大夫何罪且吾不以一眚掩大德及彭衙之役秦師再敗左右皆曰孟眀之罪也必殺之秦伯曰孤之罪也芮良夫之詩曰大風有隧貪人敗類聼言則對誦言如醉匪用其良覆俾我悖孤實貪禍以纍夫子夫子何罪爰作秦誓受責若流詢茲黃髮故如秦穆公可謂善則稱人過則稱已者矣晉無公族為驪姬之詛也及成公立乃宦卿適子為之田以為公族又宦其餘子為餘子其庶子為公行晉于是有公族餘子公行趙盾請以括為公族曰君姬氏之愛子也微君則臣狄人也公許之于是趙盾退為旄車之族使屏季以其故屬為公族大夫趙盾其補過者乎桃園之釁為法受過未謂之引過也旄車之族君屏季而自謂狄人夫猶有趙衰之思乎故以寡怨已爭再見于經其所處過則亦有道也宣公十一年冬十月楚人殺夏徴舒丁亥楚子入陳楚人殺夏徴舒未足以著楚子也楚子入陳則足以著楚子矣左氏曰楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯奔晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弒其君寡人以諸侯討而戮之諸侯皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弒其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛蹊者信有罪矣奪者得毋已過乎諸侯之從曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之毋乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸懷而與之乃復封陳鄉取一人焉以歸謂之夏州故楚莊之引善秦穆之悔過雖也桓文未之逮也蹇叔申叔時二人者秦楚之蓍龜宣公十有二年夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績敗非一日也月而日之自晉之敗無如此日也楚既敗晉次于衡雍潘黨曰君盍築武軍收晉尸以為京觀乎楚子曰非女所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之又作武其卒章曰耆定爾功其三曰敷時繹思我徂維求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無亡其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功違民猶多民何安焉無德而強爭諸侯何以和衆利人之幾安人之亂何以豐財武有七德我無一焉何以示子孫其為先君宫告成事而已甚矣楚莊之讓也以善與人以過自與自秦穆而後未有及此者也雞澤之會晉悼公之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無二志事君不辟難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司焉臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能訓討至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請自楚莊而後稱善引過無有如晉悼公者也襄公十三年秋九月楚子審卒左氏曰楚子疾告大夫曰不榖不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其宏多矣若以大夫之靈獲保首領以沒於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚子卒子囊請諡大夫曰有君命矣子囊曰君命以其若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎故如楚共則亦庶乎自引過者矣昭公七年秋九月公至自楚孟僖子病不能相禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊豫口其共也如是臧孫紇有言曰聖人有眀德者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬説與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼故唯孟僖子為知過知善也不知善不知過而稱善引過無益也韓宣豫聘於鄭有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求晉國未可以二若屬有讒人交鬭其間鬼神助之以興其凶怒悔之何及吾子何愛于一環以取憎于大國也子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之患無令名之患為國非不能事大字小之難無禮以定其位之難夫大國之人令於小國而皆獲其求何以給之一共一否為罪滋大它日韓子私買諸賈人既定矣商人曰必告君大夫諱子請諸子産子産又以為不可韓子乃辭曰起不敏敢求玉以徼二罪夏四月鄭六卿餞宣子於郊宣子皆獻馬焉而私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免我死也敢不藉手以拜如韓起者亦自知過也以善與人以過與已如是以行於天下無往不得龜筮也是仁者之要務也作忠章第十三子云善則稱君過則稱已則民作忠君陳曰爾有嘉謀嘉猷入告爾君于內女乃順之于外曰此謀此猷惟我君之德於乎是惟良顯哉善稱君而過稱已何義也春秋之法不阿人善不誣人過不以善奉人不以過貶已亦本於仁恕敬嚴先內而後外而已善則稱君過則稱已其謂叔孫豹公婼之行與非謂叔孫豹公婼之行也謂夫元咺之訟衛侯季孫之訴昭公入不可告於內出不可順於外謀猷內匱而否德外聞者也春秋之法君臣父子夫婦昆弟則皆無競也詩書之有詭詞詭而正春秋之有隱義隱而嚴正以𨗳君上嚴以治臣子各有所取之也夫謂季札子之義與出聘諸侯正於四方而不道其內惡隱公三年三月庚戌天王崩秋武氏子來求賻言夫魯之不賻也穀梁子曰歸死者曰賵歸生者曰賻歸者正也求者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之榖梁子之論則是也其交譏之則非也君臣之義信無交質疑無交譏同善而臣取微同過而臣専多天王之崩五月矣而魯賻不至乃使王人求之天王何過之有然則天王使宰咺來歸惠公仲子之賵無與分過者過不在天子與曰於是平王老矣魯侯所謂宗老也周室既遷魯鄭是賴成其所讓愛其所親聲子不為嗣夫人則仲子為嗣夫人趙姬之下隗氏春秋不非則何為其非之也平王亦若曰豫一人且老矣恤死而厚生亦宗國之義也而魯侯不復浸及二年有求賻之憖詩曰叔兮伯兮褎如充耳魯隱公之謂也夫春秋則猶不非其公也七年冬天王使凡伯來聘戎伐凡伯于楚丘以歸以歸者何歸乎歸戎則魯當討戎歸魯則魯當自討也魯不討戎又不自討則是戎魯也戎魯者謂有潛唐之盟存焉而榖梁子以為戎衛則猶薄之乎戎衛也九年春天王使南季來聘於是桓王之立七載矣而公不朝周其不朝周者何曰吾以攝則不得以諸侯見不得以諸侯見則不得以諸侯致討然而會盟之事公固以諸侯自與也以諸侯自與天子亦因而與之來聘不來錫命則猶之乎半與也而公得以辭曰桓少云耳少固足與於弒矣故曰天子無過而諸侯無善也桓公四年夏天王使宰渠伯糾來聘桓公之立於是三年矣惠公仲子之賵則亦可以報也凡朝聘禮幣各有典章重幣匱于侯國則彞供乏於天府雖管子子産未之能正也魯又無宰焉故使善獨専於天子而過獨専於魯國也然則魯桓弒君天子不能討也又使宰來聘天子獨無過與曰天子何過之有舍御立戲則宣王行之舍聲子命仲子則平王行之立君致聘則猶王府之舊也天子何過焉夫將有鄭之禍乎鄭不朝王王得而討之魯不朝王王不得而討之以聘為討王亦有所不得己也五年夏天王使仍叔之子來聘秋蔡人衛人陳人從王伐鄭鄭伯叛王而猶畏於齊魯齊魯者甥舅伯叔之奧也齊與鄭如紀則王不得不聘于魯是非禮聘也間年而至以卿大夫之不間告于伯氏伯氏與王則勝在王伯氏與鄭則勝在鄭伯氏中立則王鄭兩競衛陳蔡何力之有詩曰叔兮伯兮靡所與同魯桓公之謂也八年春天王使家父來聘冬十月雨雪祭公來遂逆王后于紀家父來聘卜主后也祭公來逆得遂事也禮卜后使魯主之魯宗國之長凡蔣邢茅胙祭周公之胤也凡伯之聘祭公之來皆禮也其取女於紀則未為得也取紀之未為得何也齊紀惡也鄭始叛周與齊襲紀襲紀不克而取后於紀則齊必重惡于紀紀以后故又必取勝于齊則周有弱后之纍無強諸侯之奉詩曰會且歸矣無庶豫子憎家父祭公之謂也然則冬十月雨雪何也曰是隂陽之事非王諸侯之所治也莊公元年夏單伯逆王姬秋築王姬之館于外冬王使榮叔來錫桓公命王姬歸于齊榮叔之來錫王不稱天是為王有過與曰王何過之有為鄭也而來聘若假鐘鼓焉為齊也而來聘若假玉帛焉王之取女於紀而歸姬于齊皆以親魯也且以解齊紀之怨天王何過之有然而不天何也曰通辭也亦已微焉耳魯之力不足以勝鄭道不足以讐齊王亦已知之矣而猶且為之親親之至也桓公十有五年春二月天王使家父來求車三月乙未天王崩車者近於賵也賵者乘車馬六匹文繡衣一襲覆地黷貨則不倫求賵則不祥是為天王有過與曰是何過之有大路大旗夏后之璜封父之繁弱周室之所分魯也東遷之幾時而乘馬不入何以責江漢故周之書天王所以别楚也其為宗室之事則書王焉已别矣無所復過也莊公五年冬公會齊人宋人陳人蔡人伐衛六年王人子突救衛夏六月衛侯朔入于衛秋公至自伐衛公羊子曰曷為或言致會或言致伐得意致會不得意致伐是得意矣何以致伐不敢勝天子也夫是則已勝天子矣王人救衛不克衛侯朔入而殺公子泄公子職放公子黔牟于周則已勝天子矣然而不書不克為公故致善於天子而殺公之過也僖公二十四年冬天王出居于鄭公羊子曰不能乎毋也榖梁子曰失天下也不能乎毋而失天下則何以不去王正天不去王也故王之與正正之與天非義也王子帶之禍蓋自惠王時而有也常棣之難急于周公麟趾之衰頺于蒍國而以不能事毋過督襄王諸侯偃然以觀狄鄭之難嚮無桓文則九鼎之隕久矣天王出居鄭亦有過焉天王何過之有二十八年冬天王狩于河陽壬申公朝于王所天子之就晉侯非過也晉侯受命出入三觀再拜稽首而謂晉侯之敢于召王者過也然則晉無召王與曰至溫河陽而不至京師則是召王也魯則無過焉耳三十年冬天王使宰周公來聘公子遂如京師遂如晉聘以公朝以諸侯諸侯朝報以公以是為善也然而非其志也則亦諸侯之過也文公元年春天王使叔服來會葬夏四月丁巳葬我君僖公天王使毛伯來錫公命自平王以來五王矣桓王之崩六載乃葬以待天下之諸侯天下諸侯無有至者惠王之喪逾年乃訃以待天下之諸侯天下之諸侯亦無有至者僖公之薧方三月而叔服銜命已儼然至矣為天子者亦何過之有然則文公之立初未錫命者與古者諸侯訃于天子天子遣使立子於殯官之側然後立于賔階受弔就位桓公生未有命沒而後命之文公已葬而後册命則猶未為晚也諸侯已偷辨髦王室崛強之輩胥命於蒲錫命之先後天王亦遲之久也久而後與之然至于桓公亦可以已矣四年冬十有一月壬寅夫人風氏薨五年春王正月王使榮叔歸含且賵榮叔者榮夷公之後也榮夷公與虢石父比而亡周王五世屬絶猶為卿士楚則未有是族也以為再見從焉亦無所貶使以賵妾為不可則未見為君母焉而妾命之又何以命于妾子而為嗣君者也故榮叔之絀王猶王之絀于榮叔也宣公十年秋天王使王季子來聘是年也春王正月公如齊公至自齊王使來徴聘夏孟獻子仲蔑聘于用王季子之來故為報聘也禮失於諸侯而不失于天子夫以周定王之明也劉康公之能也王孫滿之敏也一言而折江漢之師猶以是聘問不失之為多過則亦難乎其為守府者矣成公元年秋王師敗績于茅戎戎數與周為難邲垂之役甘大夫乘而敗之將復報周于是晉侯使瑕嘉平戎于王單襄公如晉拜成戎還劉康公將遂伐之叔服曰不可背盟而欺大國背盟不祥欺大國不義神人棄之將何以勝不聽遂伐茅戎三月敗于徐吾氏如是為天子之過乎為王季子之過乎或謂天子之懦也使王札子殺毛伯召伯於是羣子各自為政劉季子伐戎而王不馭夫使戎伐王而王無以報者誰乎非晉必鄭非魯必衛也公羊子曰孰敗之蓋晉敗之或曰貿戎敗之然則曷為不言晉敗之王者無敵蓋若自敗者然然則曷為不言瑕嘉敗之瑕嘉則猶之祝聃者也成公八年秋七月天子使召伯來錫公命是簡王也錫誰為成公也天子不錫公命公亦自與也故從而錫之天子於是易與矣將謂過在天子乎哉襄公三十年夏天王殺其弟佞夫王子瑕奔晉夫是則過在天子矣自天子之家言之也家人之九五是天子也曰王假有家交相愛也其上宗廟也曰威如之吉反身之謂也靈王之弟儋季卒其子括將嗣服見王而歎單愆期曰烏乎是欲王矣入告王曰是括也不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩景王立儋括謀立王子佞夫遂圍蒍逐單愆期五月癸巳尹言多劉毅單蔑甘過鞏成五子殺佞夫括與瑕奔晉故殺佞夫者非王也而王受其名王以睽反于家人也不如反身終王之身而王室乃亂世無盟主子朝崩離黃父之盟不殄厥孽卒使尹召抱册入楚夫獨景王之過也乎昭公二十五年九月己亥公孫于齊次于陽州是秋大雩將逐季氏也公為公果公賁與郈氏主之公告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也公退之辭曰臣與聞命矣言若泄臣不獲死乃館于公叔孫昭子如闞公居于長府九月戊戌伐季氏入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待罪于沂上弗許請囚于費弗許請以五乘亡勿許子家子曰許之政之自出久矣隱民多取食焉日入慝作勿可知也郈孫曰必殺之俄而叔孫與孟氏之徒皆叛遂伐公徒子家子曰諸臣實為之公不與聞公可止矣公曰余不忍也遂辭墓孫于齊次于陽州子家子勸公如晉不聽叔孫婼曰闞歸責季孫勸季孫迎公歸公徒以為不可昭子遂祈死也衛獻公之暴有孫文子公子鮮而卒以反國以昭公之嫺也得子家羈叔孫婼為之左右而卒以沒于乾侯悲夫夫亦有嘉謀嘉猷而莫之肯從也詩曰我龜既厭不我告猶如穆叔昭子寧武子子家懿伯者亦可謂以過歸己不以過歸君者矣作孝章第十四子云善則稱親過則稱已則民作孝大誓曰豫克紂非豫武惟朕文考無罪紂克豫非朕文考有罪惟豫小子無良善稱親而過稱已何謂也其為頴封人鄭莊公之事與曰為申生伋夀之事也申生伋夀未足以與於此也而與之何也君親之際以過自與則必有隱慝焉而申生伋夀其至者也恆言不建嘉辭無文何稱善引過之有其謂我莊公與詩曰母氏聖善我無令人則謂我莊公者也莊公何引過之有公羊子曰念母也桓公既葬夫人孫於齊懟齊則絶其母絶母則難其子齊亦悔禍也謝之以彭生維之以王姬王姬卒于齊而莊公為之服大功之喪大功之喪齊侯所宜服之於文薑也或曰公于齊侯亦宜為之大功干是功衰矣而公以意眀之是公所以作孝也然則許子止不足以與于此乎曰許子止之法盡矣善過皆無所歸飲罪而已矣是春秋之義也敬美章第十五子云君子弛其親之過而敬其美論語曰三年無改於父之道可謂孝矣髙宗云三年其惟不言言乃歡是無所取於莊公也曰何無取於公也公避母黨不敢娶於齊者二十有四年及文薑薧齊好將絶齊亦重絶魯也齊侯要我以髙傒申之于榖申之於扈以為親之過亦可以弛矣於是不弛則亦無所弛之也故卿迎夫人之禮則於此廢也春秋之義于先公有敬有弛冕而親迎仲尼所貴終春秋之世行之者一公而謂君子不與其親迎則是子翬仲遂又相與旁皇于道也故春秋于莊公弛者有二敬者有二觀社也丹楹覿幣也文而壞法君子弛之如齊納幣也如齊逆女也質而近禮君子敬之夫以莊公親聞子翬之禍四十不娶躬行親迎而世猶嗷然非之則君父遺行之可敬弛者少矣然則春秋無討君夫人之法乎曰王者無之霸則有焉王者以家人之道治天下反身而威威而吉霸者以睽之道治其家反目而異異而傷春秋王者宥文薑之卒齊桓霸者董哀薑之喪由是以觀或弛或敬蓋可知矣莊公二十有一年秋七月夫人薑氏薨二十二年春王正月肆大眚癸丑葬我小君文薑肆大眚其為文薑與猶與衆弛過也與衆弛過即不言弛過吾得所以弛過者焉葬我小君其為敬美者與美亦與衆也即不言敬美吾得所以敬美者焉然則薑氏或薨于齊或薧于莒何書之乎亦曰薧于齊至自齊薧于莒至自莒若比而已然則其稱我小君何謂也曰告于外國之辭也然則何為不别而絶之曰夫人之罪未至於滅祀也詩之所刺春秋不更刺也莊公二十有四年夏公如齊逆女秋公至自齊八月丁丑夫人薑氏入公羊子曰其言日言入何難也其難若何夫人不僂不可使入約然後入穀梁子曰入者內弗受也日入惡入者也何用不受也以宗廟弗受也君子曰是無所敬之已多乎美若其過者則亦可以弛矣曰是盟主之誼也然則盟主禁人復讎乎曰復讎之義親讎則讎之親不讎則亦不讎也王鈇柄上或束于道或束於法僖公元年秋七月戊辰夫人薑氏薨于夷齊人以歸十有二月丁巳夫人氏之喪至自齊二年夏五月葬我小君哀薑左氏曰君子以齊人之殺哀薑也為已甚矣女子從人者也從人何也弛哀薑之過也共仲弒君哀薑與聞首惡未得而賊其主母以為重于文薑也非莊公之志也然則春秋彼之何也曰氏之不去其夫人未為重討也葬我小君則猶哀之也霸者自霸王者自禘王霸者尊尊王者親親然則何以弛之曰反哭祔廟而致之則已過然則禘而致者謂是哀薑乎曰非哀薑也閟宫之八章曰令妻夀母蓋謂公夫人也宣公元年春王正月公即位公子遂如齊逆女三月遂以夫人婦薑至自齊婦者從夫之稱也非為從姑之稱也以姑逆婦而又加之公子則公子造亂者也以公子逆婦而又繫之姑則是姑造亂者也春秋弛其造亂者而敬其成禮者曰是夫人之志也夫人得而命之夫人得而取之若敬嬴之與出薑邈不相與者使後世見之但以罪遂之以夫人也是夫人無過而仲遂過也然則季孫無過乎曰季孫者仲遂之彀也遂其嚆矢焉耳宣公八年夏戊子夫人嬴氏薨冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬敬嬴身與於亂殺子惡子視而春秋無譏焉無譏則曰不克葬克葬何也曰是隂陽之治非聖人之所治也以桓公之威也不得以霸道治哀薑而謂聖人以神道治敬嬴則豈不滋過者乎成公十四年秋叔孫僑如如齊逆女九月僑如以夫人婦薑氏至自齊穆薑不氏而齊薑有氏何也齊薑敬而穆薑弛也穆薑之弛以僑如故而于仲遂弛之何也仲遂之於僑如濟美也公羊子曰夫人何以不稱薑氏貶曷為貶譏喪娶也喪娶貶公一體而貶夫人榖梁子曰大夫不以夫人以夫人非正也刺不親迎也然則宣公之貶為喪娶成公之貶為不親迎無貶夫人者而曰弛敬嬴與穆薑何也曰是仲遂僑如之所兼與也敬嬴之婦仲遂以之穆薑之婦僑如以之婦則不同而所以之夫人一也故于同辭之間而微為致異其所致異者何曰齊薑氏而穆薑不氏也襄公九年五月辛酉夫人薑氏薨秋八月癸未葬我小君穆薑夫是則弛敬交至也敬嬴之葬以雨奪其日穆薑之喪以婦奪其檟是聖人所不討也聖人於宣敬其母于襄敬其祖母曰是國家之大事宗祧存焉耳微文去取聖人亦有所不貴也然則無改乃歡之義何也曰魯人所惡季文子也君方在殯而逐其所惡栗乎若不可朝夕者是亦孟莊子之所惡也君子之於孝讓致一焉耳坊記集傳卷一
