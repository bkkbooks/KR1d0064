body:
  text: 坊記集傳卷二明黃道周撰微諫章第十六子云從命不忿微諫不倦勞而不怨可謂孝矣詩云孝子不匱孝之與忠一也孝不違親忠不違君此治以王者也孝不陷其親忠不陷其君此治以天者也春秋以天治臣子亦以天治君父然終春秋之世未有子諫其父者也臣諫其君則有之至於不忿不倦不怨則亦鮮詩曰匪言不能胡斯畏忌夫以畏忌施於君父則方未諫而忿心從之忿而倦倦而怨臣子之勞匱則自是始也莊公十九年巴人伐楚楚子禦之大敗於津還鬻拳弗納遂伐黃敗黃師於踖陵還及湫有疾夏六月庚申卒鬻拳葬諸夕室亦自殺也而葬於絰皇絰皇者冡之闕閽也初鬻拳諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之是以拒王於門沒又殉於絰皇也如鬻拳者可謂不忿不倦不怨矣夫鬻拳強諫也懼君以兵忿孰如焉而謂之不忿何也鬻拳之以兵蓋欲自殺也古之自殺而諫者史魚之於衛靈公是也史魚死而鬻子不死死者以為良史不死者以為大閽故史魚鬻子皆可以不匱也然則鄭莊公何以不諫其母曰臣有所得於君子有所不得於母僖公五年春晉侯殺其世子申生左氏曰晉獻公寵驪姬將殺太子以君命命申生曰君夢齊薑必速祠而歸福申生許諾乃祭於曲沃歸福於絳公田乃置鴆於胙公至召申生獻公祭之地墳試之物斃申生恐而出公殺其傅杜原欵申生奔新城杜傅使圉告申生曰欵也不才不能訓𨗳以至於死小心狷介不敢行也是以言至而無所訟之吾聞君子不去情不反讒讒行身死猶有令名焉死不遷情強也守情説父孝也殺身以成志仁也死不忘君敬也孺子勉之或謂申生曰非子之罪何不去乎申生曰不可去而罪釋必歸於君是惡君也章父之惡而笑諸侯吾將誰入吾聞之仁不惡君知不重曰有困勇不逃死吾將伏以俟命驪姬見申生而哭之父忍之况國人乎申生乃經於新城方申生之未死也或謂申生曰子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂是則杜原欵之教也為人師傅不能免人於難又不能自免也而相示以辨言為諱夫有豺狼其父之心乎子夀不諌其父而從伋以死則猶之素厲也詩曰相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之是杜原欵里克之過也能諫而又能死者其惟富辰乎僖公二十四年夏狄伐鄭左氏曰鄭之入滑也滑人聽命師還又即衛鄭人伐滑王請滑不聽又執王人王怒將以狄伐鄭富辰諫曰不可臣聞之太上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之胤也召穆公思周德之不類故糾合宗族於成周而作詩曰棠棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于墻外禦其侮如是則兄弟小忿不廢懿親鄭在天子兄弟也鄭武莊有大勳勞於平桓凡我周之東遷晉鄭是依子頽之亂又鄭之繇定今以小忿棄之毋乃不可乎章怨外利不義棄親即翟不祥以怨報德不仁王不可以棄之不聽遂以翟伐鄭取櫟王德翟人將以其女為后富辰又諫曰不可臣聞之曰報者倦矣施者未厭狄固貪婪王又啓之女德無極婦怨無終翟必為患王又弗聽及翟后立通於甘昭公王黜翟后翟遂攻周王出及坎欿翟敗周師獲周公忌父原伯毛伯殺談伯富辰曰昔吾驟諌王不從以及此難若我不出王其以我為懟乎乃率其屬死之富辰可以不死也而以為不死無所致其勞故雖死不怨者富辰之諌是也富辰可謂不匱矣文公十八年冬莒弒其君庶其左氏曰莒太子僕弒紀公以其寶來奔宣公使僕人以書命季文子曰夫莒太子不憚以吾故殺其君而以其寶來其愛我甚矣為我豫之邑今日必授無逆命矣里革遇之而更其書曰夫莒太子弒其君而竊其寶來不識固窮又求自邇為我流之於夷今日必通無逆命矣明日有司復命公詰之僕人以里革對公執之曰違君命者女亦聞之乎對曰臣以死奮筆奚啻其聞之也臣聞之曰毁則者為賊掩賊者為臧竊寶者為軌用軌之財為姦使君為臧姦者不可不去也臣違君命者亦不可不殺也公曰寡人實貪非子之罪也乃舍之及夏宣公濫於泗淵里革斷其罟而棄之曰古者大寒降土蟄發水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也鳥獸孕水蟲成獸虞於是乎禁罝羅矠魚鱉以為夏稿助生阜也鳥獸成水蟲孕水虞於是乎禁罝䍡設穽鄂以實廟庖畜功用也且夫山不槎蘖澤不伐天魚禁鯤鮞獸長麑䴠鳥翼卵蟲舍蚳蝝蕃庶物也古之訓也今魚方别孕不教魚長又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也俾我得法有司藏之使吾毋忘諗師存侍曰藏罟不如置里革於側之不忘也里革則猶之諷貪者也徑而多致夫以文子為舜功者不攘里革之羭以匱文子者乎齊景公田於沛還坐於遄臺晏子侍子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得和公曰和與同異乎對曰異和如和羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以替其否是以政平而不乖民無爭心詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁大小短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之専一誰能聽之同之不可也若是故諫有五而晏子皆用之近市之識屨價諷也不誅祝史正也擇射鷃者反也以禮靖國直也爽鳩之樂從也晏子之諫可謂不匱者矣魏戊之為梗陽也梗陽人有獄魏戊不能斷以獄上其大宗以女樂賂魏獻子將受之魏戊謂閻沒女寬曰主以不賄聞於諸侯若受是賂賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎獻子曰吾聞唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食食之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子乃辭梗陽人孝子不匱魏戊有焉朋友攸攝閻沒女寬有焉范宣與和大夫爭田久而無成宣子欲攻之問於伯華伯華辭以軍事問於孫林父林父辭以旅人問於張老張老辭如伯華問於祁奚祁奚辭以公族問於籍偃籍偃辭如張老問於叔魚叔魚曰吾為子戮之叔向聞之見宣子曰盍訪之訾祏乎訾祏直而博且吾子之家老也於是司馬侯祁午皆諫未聽乃問於訾祏訾祏曰昔隰叔子違周難於晉國生子輿為理以正於朝朝無姦官為司空以正於國國無敗績世及武子佐文襄為諸侯諸侯無二心及為卿以輔成景軍無敗政及為成師居太傅端刑法輯訓典國無姦民後之人可則是以受隨范及文子成晉荆之盟豐兄弟之國使無有間隙是以受郇櫟今吾子嗣位朝無姦行國無邪民賴三子之功饗其祿位既無事矣而非和將何治為宣子悅乃益和田而與之平訾祏死宣子歎之以為無所朝夕也故春秋無諌子若富辰里革晏子可謂不匱之臣矣自晏子而外其唯師曠乎襄公十四年夏四月己未衛侯衎出奔齊師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之女天容之如地民奉其君愛之如父母仰之如日月敬如神明畏如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失牲有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂𨽻圉牧皆有親䁥以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟補察其政史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其欲而棄天地之性必不然矣師曠之論則有所本也何本之有於里革之論晉厲公也然言諫者至於師曠出君之論而匱矣惜乎共世子之不遇師曠也睦族章第十七子云睦於父母之黨可謂孝矣故君子因睦以合族詩云此令兄弟綽綽有裕不令兄弟交相為愈隱公元年冬公子益師卒二年夏無駭帥師入極四年秋翬帥師會宋公陳侯蔡人衛人伐鄭五年冬十有二月辛巳公子彄卒八年冬十有二月無駭卒九年春挾卒猶是公族也而進退異辭何也榖梁子曰惡者不日而有公子與不公子焉公羊子曰無駭始滅者也翬與弒者也或曰公子益師公子彄先公子也已命者也無駭挾未命者也隱不爵命大夫則亦非先大夫矣非先大夫故不舉族左氏曰無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公乃命以字為展氏夫是知公之不睦族也公自以為未君也諸公族不與爵命九年之中沒兩公子兩公族而皆未有爵命也共守爼豆而不得俯僂之錫則其思去者衆矣且以氏錫僖伯則不得不以氏錫無駭與挾不以氏錫無駭與挾則亦不得以爵與翬無駭與翬猶之驂服也靷緩則皆判矣故無駭者幸而先隕也不幸而不先隕則入極之志必與鍾巫發軔故鍾巫者入極之餘烈也聖人未有無故而疑其詞者也隱公十年夏六月壬戌公敗宋師於菅辛未取郜辛巳取防秋宋人蔡人衛人伐戴鄭伯伐取之左氏曰庚午鄭師入郜辛未歸于我庚辰鄭伯入防辛巳歸于我君子謂鄭莊公於是乎有禮以王命討不庭不貪其土以勞王爵正也是則未為正也周鄭皆姬也郜者文王之昭也榖梁子曰極亦姬姓也戴亦姬姓也戴之姬姓何也曰陳留所謂國也出於姬姬姓四十國極戴處二焉冬十月壬午齊人鄭人入郕左氏曰討違王命也郕亦文王之昭也蓋自入極以來四滅同姓五月之間取文昭之二族以為鄭人取之而魯鄭同罪且是伐戴之師春秋歸於鄭伯取郜取防則未嘗歸之鄭伯也入郕之惡分於齊鄭入極之惡則不分於齊鄭也是皆我始之以為齊晉之開塞自是而後晉獻興基首滅虞虢文公創伯先執曹衛文武之昭穆自相斬刈則實於隱公始也故坊記者記壞防之所繇始也棠棣之詩曰是究是圗亶其然乎角弓之詩曰爾之教矣民胥效矣其魯隱公之謂夫桓公二年夏四月取郜大鼎于宋戊申納于太廟左氏曰宋督已殺孔父而弒殤公召公子馮於鄭而立之以親鄭以郜大鼎賂我齊陳鄭皆有賂焉夏四月我取大鼎於宋戊申納於太廟臧哀伯所謂章賂者也記者之意則似以為憫郜也郜恃同姓弱而見侵故納鼎於宋以資其援今既入其國又取其鼎則非宋鄭滅郜而魯實滅郜也魯實滅郜春秋之所責也桓公三年六月公會杞侯于郕杞者亡國之後也郕者兄弟之親也會杞于郕則是縣郕也縣郕則謂郕不若紀也隱桓之間無令兄弟其是之謂與莊公三年春王正月溺會齊師伐衛左氏曰疾之也榖梁子曰溺者何也公子溺也其不稱公子何也惡其會仇讐而伐同姓故貶而名之也夫亦謂其黨朔與朔與黔牟則皆兄弟也而朔無王黔牟有王朔無公子黔牟有公子故存春之王而去溺之公子是亦一道於睦族之説則未有礙也莊公八年夏師及齊師圍郕郕降于齊師公羊以為盛也盛亦同姓也成非同姓也左氏不言同姓而直以為郕則是不諱同姓也左氏之義諱此而見彼若季文子之納莒僕不見之於傳而見於國語是也閔公元年春王正月齊人救邢邢者周公之後也邢有狄難而魯有內患魯不能救而齊救之則猶之魯救之也然則魯無內患能救邢乎曰不能何知其不能也諸侯不相遺俘莊公六年魯受衛俘諸侯異姓分媵同姓分患齊侯遷衛而魯人不能具其雞豕以其受衛俘知其不能救衛以其不能救衛知其不能救邢也然則魯不若曹乎聶北之會曹宋同功而魯無有曰魯之視曹猶之極戴邸郜也可滅則滅之矣不可滅則聽霸主之從頌故邸復見於經郕之復見於經誼不許魯與杞之縣郕也僖公二十有五年春王正月丙午衛侯燬滅邢是禮至所掖殺國子也邢嘗與狄伐衛則邢亦狄也邢狄而衛滅之文公所哀痛而致志也邢不滅於衛亦滅於狄然卒不幸不滅於狄而滅於衛蓋桓管不死則未有此也詩曰人之云亡心之憂矣管仲之謂也僖公二十有八年春晉侯侵曹晉侯伐衛左氏曰晉侯將伐曹假道于衛衛人弗許還自南河濟侵曹伐衛正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍晉侯齊侯盟于斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛正月戊申則有其日也二月盟于斂盂則有其月也衛侯出居于襄牛則有其地也然則春秋不書而書兩晉侯何也曰有霸無王此非一日之故矣非一日之故何也晉侯出於翟將入齊行過五鹿乞食於野人野人舉塊以與之子犯曰天賜也天事必象十有二年必獲此土於是十二年矣及離齊入楚行過衛衛有邢翟之虞不能禮焉寧莊子言於衛侯曰康叔文之昭也唐叔武之穆也周之大功在武天胙將在武族苟姬未絶守天聚者必武族也武族唯晉實昌晉胤公子實德天胙有德晉之守祀必公子也衛侯弗聽自衛過曹曹共公亦不禮焉聞其骿脅欲觀其狀諜其將浴設微薄而觀之僖負羇之妻言於負羇曰吾觀晉公子賢人也其從者皆國相也以相一人必得晉國得晉國而討無禮曹其首誅也乃餽飱置璧焉負羇謂曹伯曰臣聞之愛親明賢政之幹也禮賔矜窮禮之宗也先君叔振出自文王晉祖唐叔出自武王二王之嗣世不廢親今君棄之是不愛親也晉公子生十七年而亡卿材三人從之可謂賢矣而君蔑之是不明賢也晉公子之亡不可不憐也比之賔客不可不禮也守天之聚將施於宜玉帛酒食猶糞土也愛糞土以毁三常無乃不可乎曹伯不聽於是晉侯伐之然則春秋不許晉侯乎曰王者在上亦有不睦之刑不睦無禮伐之是也然而已遫已遫則猶之不睦也若不得併日而伐之然穀梁子曰再稱晉侯忌也忌之為言意也急也然則鄭亦不禮而未伐之何也曰疑楚也曰首止之會王將以鄭和楚鄭於是逃盟而疑之何也曰自洮而後五會矣晉未執牛耳焉鄭伯相王蘭又在晉是以遼緩之然則鄭之後伐公子蘭之為也不然難乎其三書晉侯也僖公三十年秋晉人秦人圍鄭是晉侯秦伯也而人之何也曰不専為怨也故散之為其二楚也而討之則晉侯不任受過不任受過而又不是以服楚則散矣秦伯聽燭之武戍鄭而還則是秦二也秦以一出而以二終之將為秦諱故并諱晉焉曰猶之未嘗討鄭云耳晉侯之初過鄭也鄭文公亦不禮之叔詹諫曰臣聞之親有天用前訓禮兄弟資窮困天所福也今晉公子有三胙焉天將啓之同姓不婚惡不殖也狐氏出自唐叔狐姬伯行之子也實生重耳成而俊方離違而得所久約而無釁一也同出九人唯重耳在離外之患而晉國不靖二也晉侯日載其怨外內棄之重耳日載其德狐趙謀之三也吾先君武公與晉文侯勠力一心股肱周室夾輔平王平王勞而德之賜之盟質曰世相起也若親有天獲三胙者可謂大天若用前訓文侯之功武公之業可謂前訓若禮兄弟晉鄭之親王之遺命可謂兄弟若資窮困還軫諸侯可謂窮困棄此四者以徼天禍無乃不可乎文公十有二年春王正月郕伯來奔溺伐衛齊救邢燬滅邢皆書王正月故知春秋之厚邢郕也厚邢郕則邢郕可以不亡然則是郕太子也而爵之何也曰國喪無君太子可以爵矣故爵之然則滕杞皆侯也而子之郕伯初喪實子也而伯之春秋蔑喪以爵小國是毋乃濫乎曰是文之昭也無故而失國王不能爵則魯爵之魯不能爵則春秋爵之魯不得請之王春秋得以請之天然則魯以侯禮迎郕子而左氏以為非禮何也魯不能存郜則亦不能存郕又冒禮焉不如從春秋而請之天故郕伯之爵春秋之所代天也成公四年夏公如晉秋公至自晉左氏傳曰夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天維顯思命不易哉晉侯之命在諸侯矣可不敬乎秋公至自晉欲叛晉而求成於楚季文子曰不可晉雖無道未可叛也大臣睦而邇於我諸侯聽焉未可以二史佚之志曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止故富辰寧速僖負羈鄭叔詹季文子此五臣者猶不忘睦族之誼也襄公二十有九年夏杞子來盟左氏曰晉侯使司馬齊來治杞田弗盡歸也悼夫人愠謂女齊受貨公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝如是可矣何必瘠魯以肥杞故女叔齊亦有睦族之誼焉然以為職貢玩好也棠棣之詩未之思焉耳定公六年春二月公侵鄭公至自侵鄭左氏曰公侵鄭取匡為晉討鄭之伐胥靡也往不假道於衛及還陽虎使季孟自南門入出自東門舍於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎太姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之乃止故如衛公叔發可謂綽綽有裕者矣敬辨章第十八子云於父之執可以乘其車不可以衣其衣君子以廣孝也子云小人皆能養其親君子不敬何以辨子云父子不同位以厚敬也書云厥辟不辟沗厥祖夫是其為衛事發與為衛事發何也君子舉其所見以倣其所不見者祖孫君臣父子之義一也而又廣之若衛事之類是也定公十四年秋衛世子蒯聵出奔宋哀公二年晉趙鞅帥師納衛世子蒯聵于戚三年春齊國夏衛石曼姑帥師圍戚公羊子曰齊國夏曷為與石曼姑帥師圍戚霸討也此其為霸討奈何曼姑受命乎靈公而立輒以曼姑之義為固可以拒之也輒者蒯聵之子也蒯聵為無道靈公逐蒯聵而立輒然則輒可以立乎曰可其可奈何不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也然則公羊子為衛君也穀梁子曰此衛事也其先國夏何也子不圍父也不繫戚于衛者子不有父也然則穀梁子不為衛君也何以斷之斷之以伯夷叔齊之讓中子也然而公子郢不可何也斷以子父不姦之義也然則蒯聵之書世子春秋與蒯聵乎曰與世子也非與蒯聵也蒯聵攘父車而衛輒攘父衣也桓公十有一年突歸于鄭鄭忽出奔衛是兄弟也而有父子焉鄭忽之乘父車與突之衣父衣皆非父所命也猶聵輒之無命也見父則不見衣與車見衣與車則不見父突忽所見皆鄭也不見莊公莊公所見諸寵也猶不見子故忽以鄭為車突以鄭為衣不得曰忽突以莊公為父莊公以忽突為子也然則忽之復稱世子何也曰等而視之忽與突也久而察之忽則世子也突則伯也從鄭人之所見而已矣桓公十五年五月鄭伯突出奔蔡鄭世子忽復歸于鄭秋九月鄭伯突入于櫟舍車而衣其衣猶謂之鄭伯舍衣而乘其車猶謂之鄭世子春秋於此何取乎使突可伯則初歸鄭而已伯使忽可世子則初奔衛而已世子又遲於四五年之後而後伯世子之使人疑鄭伯之於世子也曰春秋之意不欲以鄭定伯與世子也欲使天定之天定之不可而後與鄭焉國無兩主君不同位必欲盡去其伯與世子則又難乎世之為諸侯者也始與之使少有辨焉而已矣然則鄭突之與衛朔同辭何也曰均非天之所定也均非天之所定則當以國定之而子儀黔牟不表於春秋何也曰春秋不許羣公子之自為國也然則春秋許子紏與曰子紏亦非世子也子紏之稱子小白之稱齊猶子紏之乘車而小白之衣衣也視其所終為之見袂軾焉耳僖公五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止秋八月諸侯盟于首止穀梁傳曰無中事而復舉諸侯何也尊王世子而不敢與盟也尊則不敢與盟何也盟者不相信也不敢以不信加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子而善之何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能朝天子又不敢致天王尊王世子於首止所以尊天王之命也世子受諸侯之尊已而天王尊矣故世子受之可也越哉榖梁子之為禮也王室未定世嫡疑二桓公率諸侯會王世子於首止以內折姦萌外一衆志故會非朝也王曰朝世子曰會王世子之出會諸侯非典也諸侯之進會王世子各致其志焉耳而穀梁子疑有擁立之事是猶以葵丘之會桓公搢笏而涖諸侯者也故乘其車不衣其衣父子不同位其辨亦取諸此也僖公七年秋七月公會齊侯宋公陳世子欵鄭世子華盟于寧母左氏曰盟于寧母謀鄭故也鄭伯使世子華聽命于會言于齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之為信違此二者姦莫大焉公曰諸侯有討於鄭未捷今者有釁從之不亦可乎對曰君若綏之以德加之以訓辭帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫子華既為太子而求介于大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可圖也齊侯辭焉子華以是得罪於鄭故管仲知所謂敬辨者矣子華既乘父車以會諸侯又姦父命以亂鄭國霸主所宜討也然且不討故晉文之學出於齊桓而齊桓特正也然則世子會諸侯不為父子同位乎曰其别之也下於諸侯一等其為父命也不然不會八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟穀梁子曰王人之先諸侯何也貴王命也朝服雖敝必加于上辨冕雖舊必加于首周室雖衰必先諸侯然則乞盟者子華乎抑鄭伯乎公羊子以為子華在會鄭伯請與子華姦命而又在會鄭伯不出而又書鄭伯則是子父殽亂也左氏曰襄王定位而後發喪蓋當莊僖之時子父殽亂始於王室而鄭衛從之故鄭衛王風詩相次者是春秋之義也僖公九年夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘穀梁子曰天子之宰通于四海宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出會以宋子為無哀矣然則管仲不辭宋襄公何也曰猶魯之不辭曹射姑也宋桓公七與齊桓之盟使子為終厥志又董之以王事宋子謂是金革也越禮而與之不亦已亟乎曰熒於齊烈也而有侈心冬晉里克殺其君之子奚齊十年春晉里克弒其君卓奚齊則曰君之子卓則曰君奚齊則曰殺卓則曰弒何也曰春秋惡夫相殺之無已也物近而不相得則凶或害之奚齊近於申生卓子不近於申生奚齊或害卓子不或害均之非世子也而無以正里克之罪故以卓荀息正之是春秋之辨位也然則春秋與荀息乎曰殺荀息與里克同辭里克之於荀息敵也有君之子有君之臣非夫世子世臣也皆不免於死而里克之譎不若荀息之正也僖公二十有八年五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土衛子者誰叔武也叔武非世子又無君喪而子之何也曰以喪禮處之也晉立以為君罪不至於降爵上假天王下資通國書侯則無等也書名則沒其實故以喪禮處之若以君父奔楚之為哀痛也降服致觳以聽天子之命是不已同位乎曰霸王為之天王下勞春秋正辭春秋不正辭則必曰衛侯叔武是國有二主也然則剽衎之有二主何也曰一出一入不在王會則以國為辭以國為辭無霸之義也然則天王狩於河陽何義也曰父坐子立乘其車不衣其衣之義也僖公二十九年夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏曰夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟於翟泉尋踐土之盟且謀伐鄭也在禮卿不會公侯會伯子男可也是為諱公者發也公會王子虎以及諸侯之卿公與王子未亂位也而春秋猶諱之是春秋之辨也敬而養志謂公雖執牛耳而無所當於盟主也然且以是著於閟宫文公七年秋入月公會諸侯晉大夫盟于扈左氏曰齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟于扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也後至不書其國避不敏也夫扈之會非正也以七國之諸侯特會晉之大夫則是以君與趙盾也以君與趙盾則公可以不會故略之非直公略之七國之公侯亦宜略之何也是皆父執也然則公子遂會晉趙盾盟于衡雍可謂養志乎曰公子遂何養志之有春秋别之各車其車焉耳十有六年春季孫行父會齊侯于陽榖齊侯弗及盟六月戊辰公子遂及齊侯盟于郪丘季孫行父則不盟公子遂則盟何義也曰襄仲賂也賂則可以同位乎曰衰世之政也自垂隴而然垂隴之盟公孫敖始會陳鄭自是諸侯同會趙盾于扈于新城而齊侯曰父執也其勝霸之餘乎而卒以賂亂故晉之多取賂於諸侯亦宗國之教也昭公二十有二年夏六月王室亂王室之亂不於是始也而於是焉書亂者蓋自是無霸矣王子猛與王子朝并絀而書名子朝又以其偏詞爚於諸侯故子父之辨位不可不審也王室四亂皆始於子父之不辨位也而鄭衛齊晉效之桓王子克莊王子頽惠王子帶景王子朝是也齊晉中亂而獲霸功鄭衛中亂而不至於亡是皆有桓文之力焉至於晉平齊景而衰矣春秋尊文王而哀周公則於是始也以王子丐之微也而書曰天王居於翟泉天王入於成周以昭公之親也而一曰公在乾侯再曰公在乾侯謂桓文之功仲尼不道則亦未之有也夫以首止河陽亦猶有亂位之事乎去首止河陽則亦無以廣孝無以厚敬故春秋者以廣孝敬為義不以正名法為義也猶屈軼之不為瑞草也敬老章第十九子云父母在不稱老言孝不言慈閨門之內戲而不歎君子以此坊民民猶薄於孝而厚於慈子云長民者朝廷敬老則民作孝舊凡二節是為曹伯之使其子射姑也身在負兹而輕越其子射姑冀大國之援而不辭其父施伯之所怪也是為儋括之欲立佞夫也除服而見志在朝柄不戚而願大聲聞於外是公子愆期之所欲殺也是為晉人之食絳老人也不鄙其廋言而遺佚是嫌是為鄭人之用燭之武也秦人之用蹇叔也詢是黃髮皓灌與謀是為周襄王之錫桓公也曰叔父耋老勿使下拜是為楚子之泣於乾溪也曰天下有愛子如豫者乎又曰豫殺人子多矣能無及乎然則小人養親何謂也謂夫許止之以親嘗藥者也追孝章第十九子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祀事教民追孝也以此坊民民猶忘其親是其為文公與文公慈惠懈于有位公孫敖叔孫得臣公子遂季孫行父為政政繇四卿祭則繇公四卿者未嘗為尸而嘗為公也文公二年二月丁丑作僖公主於是過葬十月矣公羊子曰主者曷用虞主用桑練主用栗用栗者藏主也作僖公主何譏譏不時也其不時奈何欲久喪而後不能也穀梁子曰立主桑主於虞吉主於練作僖公主譏其後也作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也榖梁子所言壞廟者何也謂壞祧廟以更新廟則必臯緩其事曠其時日易簷改塗則自五月而練已濟矣然則十月而後藏主其有躋僖公之心乎其有躋僖公之心何也諸侯五世去廟而祧自隱而僖五世矣惠公在位幾五十年隱公九會諸侯幾霸中夏疑於不祧焉魯人之意欲下閔公也而有所不敢故遷延於孝惠之祧廟而穀梁子以為易簷改塗焉可者則將在孝惠與將在閔廟與曰必在孝惠也閔為禰廟如之何以禰廟為祖廟也八月丁卯大事于太廟躋僖公大事于太廟蓋請之周公也秋嘗者魯祭之重者也僖公之頌曰秋而載嘗夏而楅衡白牡騂剛犧尊將將白牡者周公之牲騂剛者魯公之牲也魯用禘祭以躋僖公使閔公俯焉絀於其下蓋自魯公以來十五世矣僖公穆也而使為昭周公宜亦未之許也而仲尼獨存其詩者何也僖公佐兩霸主再朝天王其薨也天王為之會葬錫命史克作頌仲尼採之則是可以大事矣然而難乎其為尸也禮廟立主祭立尸祖為之主則孫為之尸越禰而祖則將使公子遂叔孫得臣輩為之尸與將使仲孫蔑公孫歸生輩為之尸與故主則易為主也尸則難為尸也事則易為事也禮則難為禮也公羊子曰大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆合升於太祖五年而再殷祭躋者何升也何言升僖公譏何譏爾逆祀也謂其先禰而後祖也是猶夫乘父之車而衣其衣者也文公六年閏月不告月猶朝于廟前此則皆告朔也春秋不書閏月二百四十二年得八十一閏而春秋取二焉春秋之法歸餘於終則猶冬十二月也文公六年書閏月不書十二月則猶之夏正十月也凡閏月不得中氣中氣移於後月之朔則節氣在閏月之中一歲之贏十日九分積而漸退七閏之章中於十一前後間起也而春秋皆歸餘於冬春秋皆歸餘於冬則文公元年誤閏三月哀公十二年冬猶流火者何也曰是傳也非經也經哀公五年冬叔還如齊閏月葬齊景公則是終閏也有螽之月益以一閏則火西伏矣故春秋八十八閏舉其五者皆為歸餘戰國之襲舛則有所本也然則閏可不告朔與曰閏生於氣朔生於月朔之有閏日月星氣之合也始以之始中以之中終以之終朔之有閏猶祀之有尸廟之有主也朝廟而不告朔猶灌鬯而不獻尸祫祭而不迎主也故文公之過文而過非質而過也易於變禮而不達其本亦猶夫公榖之謂天無是月喪事不數通可以已者也然則春秋不曰告朔而曰告月何也日月者民事之所從生也民受精於日而成形於月月歲十二交隱其資始而著其資生至於閏而著矣閏者王正之門也非是則無以成歲故二典之所致慎也十有三年秋世室屋壞公羊子曰世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宫魯公之廟曷為謂之世室世世不毁也周公何以稱太廟于魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯封魯公以為周公主周公之不之魯欲天下之一于周也魯祭周公何以為牲周公用白牲魯公用騂剛羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廩世室屋壞何以書譏何譏爾久不修也穀梁子曰宗廟之事君親割夫人親舂敬之至也為社稷之主而先君之廟壞極稱之志不敬也然則焬宫武宫可以不壞乎曰焬宫武宫可以不壞則桓宫僖宫可以不災曰無以為主亦無以為尸則無以為事矣然非所論於太室之道也十有六年夏五月公四不視朔四不視朔則是王正視朔也王正視朔則猶知有王也春陽穀之會公不肯會齊侯齊侯亦不會行父行父以疾歸公公亦以疾自與也公之以疾自與何也歸惡於齊侯也齊侯弒其君舍而執其君母及我大夫一載之內再侵吾疆是而與之會則辱吾君不與之會則虔劉我西鄙姑委之行父仲遂行父必曰仲遂也能公於是以疾自與也然則公不視朔是乎曰四不視朔則已過矣魯秉禮之國也其或有他難則猶以祀事自免也而棄先生之朔廢朝廟之典使後世襲之以為故常是則文公之過也然則齊討奈何曰天下之可已亂者惟禮也以商人之逆寄生不者榮慎吾封疆正辭以折之縱不能討天下之與我不少矣而孤以疾自與卒之行賄竟無所伸其説則是行父子遂之罪也然則居者有疾行者有事其告月之禮如何曰行者借廟而朝之居者宗祝致其辭食義章第二十子云敬則用祭器故君子不以菲廢禮不以美沒禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福詩云既醉以酒既飽以德以此示民民猶爭利而忘義文公二年三月乙巳及晉處父盟誰及之公及之公及之而不書所以辨位也亦以辨器三年冬公如晉十有二月己巳公及晉侯盟左氏曰處父之盟晉侯懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂是不廢禮亦不沒禮也善哉晉襄公之悔也猶有桓文之遺焉至於靈平魯幾不得於諸侯四年衛侯使寧俞來聘左氏曰衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴享之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾如寧武子可謂知禮矣穆叔之聘晉則於此昉也成公二年晉侯使鞏朔獻齊捷於周春秋不書為非禮也王弗見使單襄公辭焉日蠻夷戎狄不式王命淫湎蔑常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室鞏伯實來未有職司於王室又姦先王之禮余雖欲與鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而太師之後也寧不亦淫從其欲以怒叔父抑豈不可諌誨士莊伯不能對王使委於三事禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王又宴鞏朔而私賄之使相者告曰非禮也勿籍周室雖衰故典猶在詩曰雖無老成人尚有典刑蓋謂此也晉侯使隨會聘於周定王饗之殽蒸原公相禮范宣子私於原公曰吾聞王室之禮無毀折今此何禮也原公以告王召士季曰子弗聞乎禘郊之事則有全蒸王公立飫則有房蒸親戚宴饗則有殽蒸今女非它也叔父實使士季來修舊德以奬王室唯是先王之宴禮欲以貽女余一人敢設飫禘焉以干舊職而亂前好且唯夫戎翟則有體薦其體氣不治若鳥獸焉適來班貢不俟馨香嘉味故坐諸門外使舌人體委與之女今王室之一二兄弟以時相見將和協典禮以示民訓則無亦擇其柔嘉選其馨香潔其酒醴品其百籩酬幣宴貨以示容好胡有孑然其效戎翟也武子不敢對退歸乃講三代之典禮修執秩以為晉法甚矣隨武子之似孟獻子也菲不廢禮美不沒禮蓋王者所醉飽天下也成公十二年冬晉郤至如楚聘且涖盟楚子饗之子反相為地室而縣焉郤至將登金奏作於下驚而走出子反曰日云暮矣寡君需矣吾子其入也郤至以曰君不忘先君之好施及下臣貺之以大禮重之備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂郤至曰若讓之以一矢禍之大者何福之為世之治也諸侯間於天子之事則相朝也於是乎有享宴之禮享以訓共儉宴以示慈惠恭儉以行禮慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為己腹心爪牙故詩曰赳赳武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之吾子之言亂之道也不可為法然吾子主也至敢不從郤至可謂無禮雖美不食者矣襄公四年夏叔孫豹如晉左氏曰穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也皇皇者華君教使臣曰必咨於周臣獲五善焉敢不重拜穆叔則學於寧武子者也武子婉而摯穆叔詳而晰是皆近於飽德者也然則楚子之歌大明韓起之賦我將皆非禮也而韓子無譏何也曰上民畏威節取焉耳不愈於與處父交盟者乎詩曰雖無德與女式歌且舞教敬教睦章第二十一子云七日戒三日齊承一人焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賔飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲夫為春秋者亦有侑尸之義與曰無之無之則所云教敬教睦者何也曰為盟會之事也盟會之有主也神明之拊也微而王人尊而侯伯貴而列卿賤而大夫相示以敬相示以睦故三王之道有所不廢也若盟主之與公尸是也莊公十有三年春齊侯宋人陳人蔡人邾人會于北杏是衣裳之始會也宋陳蔡邾首尊齊侯以為盟主衛遂未之從也然而衛歸猛獲則從之矣誅不從而首滅遂夫為尸者亦有澄酒之心乎冬公會齊侯盟于柯公羊子曰何以不日易也其易奈何桓之盟不日其會不致信之也其不日何以始乎此莊公將會乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾于是會乎柯莊公升壇曹子手劍而從之管子進曰君何求乎曹子曰城壞壓境君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子摽劍而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著於天下自柯之盟始焉然而曹沫之能得於柯犂彌之能不可得於夾谷桓公之信下盟於匹夫定公之信不動而著於天下則教敬教睦之道異也定公十年春王三月及齊平夏公會齊侯于夾谷夾谷之會則亦不日也左氏傳曰夾谷之會孔丘相犂彌言于齊侯曰孔丘知禮而無勇使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之於是齊人來歸鄆歡龜隂之田夫以諸侯盟會神人聽睹非朝伊夕而使匹夫裔夷昧視其間禮儀笑語委之秕稗雖信猶無所獲申豐曰宗廟之中未施敬於民而民敬之其夫子之謂乎莊公十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟桓公之盟也不致日不致諸侯不歃血欲從者從之夫有如是之盟者乎則猶之不盟也是猶之不􅓪士不擇日而祭也亦猶之不立阼不設位而迎尸也柯之會以其易而易之至於鄄而極矣夫猶以彭生子紏之事以失魯為恥者乎而使大夫會于霸主猶因酒肉而聚宗族也西鄙之伐則繇此矣謂其道之不足教敬也亦以長勺長其驕心二十三年公如齊觀社曹劌諫曰不可夫禮所以正民也先王制諸侯五年四王一相朝也終則講於會以正班爵之義帥長幼之序訓上下之節其間無繇荒怠夫齊棄太公之法而觀民於社君為是舉而往觀之非故業也天子祀上帝諸侯會之受命焉諸侯祀先王先公卿大夫佐之受事焉臣不聞諸侯之相會祀也祀又不法君舉必書書而不法後嗣何觀公不聽遂如齊故曰堂上觀乎室堂下觀乎上以是尸女使人無所奔走易曰閫觀女貞亦可醜也其是之謂與二十有七年春公會杞伯姬於洮左氏曰非事也天子非展義不巡狩諸侯非民事不舉卿非君命不越竟是亦穀梁所謂尸女也承一人焉使人無所奔走其有酒肉之心乎然則公子結之媵陳人季子友之葬原仲亦君命與曰皆君命也非君命不著於經閔公二年夏五月乙酉吉禘于莊公公羊子曰其言吉何言吉者未可以吉也曷為未可以吉未三年也曷為未三年三年之喪實以二十五月其言于莊公未可以稱宫廟也曷為未可以稱宫廟在三年之中矣吉禘于莊公何以書譏何譏爾譏始不三年也然則三年矣有莊公之宫廟亦可以禘乎曰禘之賜為周公也非為魯公魯公從周公周公不從魯公也閟宫之頌曰周公之孫莊公之子龍旗承祀六轡耳耳春秋匪懈享祀不忒龍旗六轡天子之禮也魯之子孫不用天子之禮則龍旗六轡不出廟門迎尸送尸無以彰天王之賜亦無以彰周公之德也故魯之羣公皆用之羣公亦從周公者也魯以禘嘗合祀於太廟從周公而用禮樂天下所不非仲尼不以為非也隱公考仲子之宫初獻六羽桓公不以為疑仲尼亦不以為疑也仲子之宫用六羽則桓宫亦必用六羽桓宫丹刻而用八羽則必以八羽而躋仲子之宫故魯之用大禮不自僖公始也其酌用侯禮自隱公始也春秋之賢隱公以為足與於禮樂魯人之尊桓公以為能張天子之賜也然則郊祀始於僖公與曰閟宫者奚斯所作也魯人郊禘祖后稷而宗周公其詩曰皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女公羊子之不譏禘而譏短喪是得於禮之正也然則周公后稷有尸與曰郊無尸而廟有尸時祭有尸而祫祭無尸然則三桓之堂亦有大禮與曰奚取之也子言之堂上觀乎室堂下觀乎上然則魯公世室亦用大禮與曰騂剛者魯公之牲也后稷亦用是牲羣公不毛羣公從周公而不從魯公從太廟而不從世室是世室之所以壞也然而皆用八佾不八佾則魯公亦無以祀周公故曰禰廟六羽魯人之所不取也僖公五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止是不日月之何也世子之出會諸侯諸侯之専會太子皆非禮也國危不事冡宰君老不事世子惠王將立子帶諸侯相率而朝王與宰周公正太子之位則子帶坐替無所用勤於首止也用勤於首止則是挾世子以命天王猶未有廟而先為尸也未有廟而先為尸則何以為主襄王之閟喪而定位則自此始也曹射姑之朝春秋書曰曹伯使其世子射姑來朝春秋不書曹伯之使射姑則射姑歸而曹伯死射姑無以正其始魯人亦無以明其令也惠王不命世子而世子私會諸侯世子歸三年而王崩王崩而閟其喪惠王即有以正其終首止亦無以正其始也然則桓之會皆不日何也曰不致也首止之會何可不致也曰從頌之以待天下之諸侯然則洮之會王人葵丘之會宰周公孰為尸與曰王命為尸宰王人柎者也其非王命則桓公為尸然則是非世子與曰世子而繫之王則猶之王命也無王命無以號召於天下八年秋七月禘于太廟用致夫人公羊子曰用者何用者不宜用者也致者何致者不宜致者也禘用致夫人非禮也夫人何以不稱薑氏貶曷為貶譏以妾為妻也其言以妾為妻何蓋脅于齊媵女之先至者也然則安知其非哀薑也曰哀薑之葬七年矣哀之則必致之是已致者也安知其非成風也曰成風後此尚三十年君立於阼階夫人出於東房君薦爵夫人薦豆君薨母不入廟無所致之是未致者也然則何知其為聲薑也曰致之又明年公及夫人薑氏會齊侯于陽穀則是聲薑也詩曰令妻夀母宜大夫庶士邦國是有然則何知其妾也曰前此則未有致也大夫不納幣公不親迎然則葵丘之會致嚴於嫡妾而公與桓公首犯之何也曰楚女未至齊薑則自以為嫡也曰薑不媵芊霸主定之固其所矣然則左氏之以為哀薑何也曰疑於莊公之未有夫人也宗廟之禮君立尸夫人不立尸君致詳夫人致略故聲子聲薑之事左氏疑於君夫人也卒事章第二十二子云賔禮每進以讓喪禮每加以逺浴於中霤飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以示逺也殷人弔於壙周人弔於家示民不偝也子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者子云升自客階受弔於賔位教民追孝也未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及弒其君卓以此坊民子猶有弒其父者是為喪葬之禮與曰非為喪葬之禮也為賊不得則薨不書葬幼君稱子幼子稱君為人臣子不敢有遇賊不討遇幼主不君使天子骫其法諸侯委其禮者也然則是一事與二事與曰猶之一事也春秋賊不得則不書葬內亂不成禮不書葬踰年之子稱君未殯之君稱子以禮立坊而託之殯弔喪葬則猶之一事也故慎終追逺不偝不爭是禮春秋之通教也無春秋則無以治禮春秋諸侯見弒者二十有三其得討賊而書葬者三四公而已其幼君十數而得書君者卓子而已卓子不足為君奚齊不足為君之子而春秋皆嚴其辭大其事以子歸奚齊以君歸卓子示父命之不可違君名之不可亂雖申生杜原欵起而不能奪也故坊記之記則必有取之也然則喪禮每加以逺升自客階受弔於賔位者何也言諸侯居喪未殯不當阼之禮也然則其為子般子赤及昭公之喪與子般子赤之喪何也子般殯莊公之喪三月矣出於黨氏公子慶父使圉人犖殺之慶父將以自與也季友不可乃立閔公於是莊公七月乃葬閔公立二年慶父又使卜齮賊公於武闈慶父身弒二君而莫之敢討也閔公又不得葬春秋不以慶父治慶父而以里克治慶父里克殺一子弒一君猶之亂命也而魯以治命亂之使莊公夷於晉獻哀薑匹於驪姬是仲尼所不忍書也子赤者何文公之子也文公薨已葬九月矣子赤幾乎成君者也公子遂私於敬嬴欲立宣公遂殺子赤及子赤之弟視夫使晉史書之必曰公子遂弒其君赤及其君之弟視而春秋稱曰子卒沒視不書春秋不以里克治仲遂而以慶父治仲遂慶父之弒一君殺一子猶有季友逐之奚斯哭之仲遂之弒一君殺一子及一大夫惠伯遂無有逐之哭之者及其死也猶為輟舞於廟是仲尼之所深痛也深痛之而不書之何也列國之史已書之矣猶晉之書里克也夫非董狐者亦曰君奚齊君卓子卒焉耳而魯人已書之乘檮杋亦已書之故春秋不以慶父仲遂治慶父仲遂而以里克治慶父仲遂也昭公之喪何也三十二年十二月昭公既薨于乾侯殯不得入殯不得入則定公不得即位弔者無所弔葬者無所葬賵者無所賵六月癸亥乃入是六越月矣又六日戊辰公乃即位又踰月乃葬諸子曰踰年不言即位正棺於兩楹之間然後即位遲之以年正之以日厲也而又有禮焉諸子則以是為禮也仲尼則以是為變也謂其不得浴於中霤飯於牖下小斂於弔戶內大斂於阼殯於客位祖於庭葬於墓弔於壙反於家升於客階受弔於賔位也為人子不得此十一於者而正棺於兩楹之間則猶與仇讐而講旅獻者矣故夫子私歎之又與諸弟子論道之乃退而筆之春秋故奚齊卓子春秋之所發端也夫魯之春秋當時則亦如此矣然則事有偝於此者乎曰有之春秋所以開卷也魯隱公生不書即位沒不書葬其生不書即位則必讓桓以為喪主升客階受弔於賔位反哭祔廟皆從幼主以附棺於兩楹之外沒不書葬則不得浴於中霤飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓虞於壙反弔於家故其即位無以正始薨葬無以正終也無以正始無以正終則春秋之書元年春王正月何也曰以春秋之義則可以正始可以正終也其可以正始正終何也隱出於聲子桓出於仲子以仲子為繼孟子者而聲子之分先於仲子隱公不忍以嫡媵之分傷惠公之志故以即位之義讓其弟以仲子之貴請於天子天子之賵惠公仲子則隱公之請隱公之義也而隱公又不自立子然則隱公未有子與曰寪舍之禍有死者羽父之克無所加毒則是不自為子也不自為子而桓公以謀羽父以謀故春秋謂桓公羽父亦有里克之義也然則里克非正者與曰以里克之正也而猶不免於晉史之書奈何以羽父之正而免於魯春秋之書之也故春王之正仲尼欲以正天下而先於魯正之也穀梁子曰隱十年無正隱不自正也元年有正所以正隱也夫正天下非為正隱也隱公四年春王二月戊申衛州吁弒其君完五年夏四月葬衛桓公誰葬之衛子晉也是十四月乃葬然則州吁之殺在四年九月又五月乃葬何也蓋州吁死乃立宣公始就西階受弔行事又五月乃葬緩矣而未偝也是誰為之曰石碏也石碏之子厚實擁州吁州吁未能和其民石碏勸之入陳以求王命乃使陳人執而殺之然則州吁不出於濮陳人又不殺州吁則如何曰國人不和州吁多怨是亦不能久有衛也而石碏惡夫厚之偝從必速殺之藉手於陳惜乎魯之無石碏也然則時有季友能為石碏乎曰不能共仲弒一子一君而不能討也幾乎不免然則石碏之殺其子季友之鴆其兄亦有差等與曰石碏有謀而季友失序父兄之過皆可以諫也而不諌討重於子牙則威殫於慶父矣故曰惜乎魯之無石碏也然則隱公無子羽父纍上討羽父亦可及於桓公乎曰歸獄於羽父亦可正位於桓公桓公二年春王正月戊申宋督弒其君與夷及其大夫孔父三月公會齊侯陳侯鄭伯于稷以成宋亂宋亂平則可以書葬矣而不書葬何也凡亂賊之興皆自謂正也羽父曰惠公歿則位宜與軌華督曰穆公歿則位宜與馮聽其言則正也而行之則偝故仁義之名非姦人所得借也不得之王命則得之君命不得之君命則春秋當命之春秋天也舉國所共為命也而羣小桀聚以為之命若翬帥師會宋陳蔡衛之伐鄭是也故春秋書曰公會齊侯陳侯鄭伯于稷以成宋亂宋亂之成華督柄宋而羽父柄魯故謂羽父弒宋殤公未有不可也桓公十有二年秋八月壬辰陳侯躍卒是次不葬者也其次不葬何也曰是有林杵臼之難焉且亦厲公也嫌於陳他之為厲公故不葬厲公是以無陳他為纍者乎或曰蔡人之欲立出也厲公無以正其禮十有五年三月乙未天王崩莊公三年五月葬桓王是亦有王子克之難焉公榖皆曰改葬意之也以莊王之懟其父亦不至於七年而隱公之薨於是二十二年矣則亦已矣無有溝而合於公宫者矣是春秋之所深痛也然則惠公亦改葬與曰隱公元年惠方練期何為其改葬也八年冬十有一月癸未齊無知弒其君諸兒九年春齊人殺無知秋七月丁酉葬齊襄公誰葬之桓公小白也誰殺無知雍廩也不與雍廩以討賊而使國共討之公羊子曰春秋君弒賊不討不書葬以為無臣子也子沈子曰君弒臣不討賊非臣也子不復讐非子也葬者生者之事也春秋后弒賊不討不書葬以為不繫乎臣子也故殺無知則襄公可以葬矣且大桓公以葬襄公所以教為人子而宏父業者也十有二年秋八月甲午宋萬弒其君捷及其大夫仇牧冬十月宋萬出奔陳賂陳人乃殺宋萬是非正討也故不書葬宋閔公不難乎其為桓公乎曰桓公之志不在於葬閔公也僖公九年春王正月丁丑宋公御説卒夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘是宋子也不葬其父而以衰絰溷於衣裳是猶之與弒者乃使其父不以葬著於春秋曰是且葬矣曰雖葬非宋襄公之志也故為父而葬葬以禮為子而葬葬以志九月甲子晉侯詭諸卒晉獻公之不書葬亂也無晉之亂而不書葬則是與亂同事也與亂同事則春秋亦以亂治之矣獻公啓禍四君二十年其幸免於弒猶孽鳥之逃羿也十有四年冬蔡侯肸卒是不與蔡也不與蔡而亦不與宋故楚宋之爭霸皆亂也肸與甲午亦皆春秋之所治也榖梁子曰諸侯時卒惡之也惡其從楚也夫春秋則亦有惡乎十有七年冬十有二月乙亥齊侯小白卒十有八年秋八月丁亥葬齊桓公危矣乎其幾為陳厲公與晉獻公也七日而殯九月乃葬誰葬之曰孝公昭也孝公與於弒乎曰不與於弒易牙立無虧而昭已奔宋故以葬與孝公昭二十有三年夏五月庚寅宋公兹父卒宋襄公之不葬謂其不葬宋桓公也桓公不書葬則不得書襄公之葬襄公無葬父之心則成公無葬父之事成公緊下者也夫亦責襄公而已矣故公羊子謂之盈諱也然則春秋諱襄公乎曰春秋公天下何諱之有然則其為桓公諱何也曰痛周公不得不痛隱公也痛隱公而諱桓公故霸者之與王交治也冬十一月杞子卒不葬謂其用夷禮也用夷禮者何蓋猶長其夏肄焉二十有四年冬晉侯夷吾卒惠公之不葬亂也懷公不得葬惠公春秋所不討也二十有八年陳侯欵卒陳蔡一也陳侯初如會退而薨如之何不葬曰陳子甫五月而與於溫夫有宋襄公之心乎為天子伸大義而使人舍親之殯以就於盟好其為人子者亦舍苴杖褰裳而從之則是與亂同事也故與亂同事者春秋之所治也若葵丘之有宋子溫之有陳子是也皆以盟主而遺其親三十二年夏四月己丑鄭伯捷卒公子瑕之亂也楚人將納公子瑕覆於周氏之汪乃殺子瑕是非與亂同事也然猶不得時葬則亦春秋之所閔也故春秋不惡其人而惡其事不閔其人而閔其時三十三年十有二月公至自齊乙巳公薨于小寢文公元年夏四月丁巳葬我君僖公是不為緩而左氏以為緩何也謂緩作主非是緩於葬也七年夏四月宋公王臣卒宋人殺其大夫昭公居喪未殯而去羣公子穆襄之族率國以攻公宫六卿和公室乃即位而葬於是羣公子不在喪位則猶之不成喪也是為禮討也故有討禮討事討人討時八年秋八月戊申天王崩九年二月辛丑葬襄王是以閏則亦八月以桓文之功功襄王故襄王之喪春秋之所貴也十有三年夏五月壬午陳侯朔卒邾子蘧蒢卒是皆內多故焉不然則已懈或曰邾子知命遷繹而民不怨立貜且而晉不敢亂夫是邾子也嘗用鄫子於次睢之社是可以不葬如之何其知命也十有四年夏五月乙亥齊侯潘卒九月齊公子商人弒其君舍舍之賊未可得也則自夏歷秋亦不可殯齊桓之烈再世而三弒其君則其內訓薄而本計失也或曰哀魯也魯不能治齊又從服焉故謂之哀魯也十有六年冬十有一月宋人弒其君杵臼十有八年夏五月戊戌齊人弒其君商人宋弒杵臼焚於孟諸齊弒商人納諸竹中是可以不葬也而使寪舍鍾巫與之同例是聖人之所痛也然則杵臼之賊壓於祖母商人之賊壓於兄同斷乎曰同亂而已冬十月子卒莒弒其君庶其子赤之賊未可得也庶其之賊則固在魯矣逸而之齊是行父之過也行父之於趙盾末減乎而猶以舜功自居故庶其之於行父同斷也宣公二年秋九月乙丑晉趙盾弒其君夷皋四年夏六月乙酉鄭公子歸生弒其君夷是兩夷生也以穿歸獄於趙盾猶以宋歸獄於歸生也是皆不足以葬猶羽父共仲之未死也十年鄭改葬幽公則猶之不葬也二年冬十月乙亥天王崩三年正月葬匡王亦猶之桓王也舉緩則已緩舉促則已促衰王不治政令霸主不治禮樂九年九月辛酉晉侯黑臀卒于扈冬十月癸酉衛侯鄭卒兩成公之不葬謂其逺魯也亦其為禮不足以葬十年夏五月癸巳陳夏徴舒弒其君平國十有二年春葬陳靈公是亦可以廢日月也是蓋二十月矣則不知其為何月與衛桓公齊襄公內討者也陳靈公外討者也外討過於大祥而猶得書葬公羊子曰討此賊者非臣子也何以書葬君子辭也楚已討之矣臣子雖欲討之無所討也以楚之討恕臣子之討惜乎其不以哀薑之討為襄仲之討也十有八年秋甲戌楚子旅卒楚莊不書卒則難乎其為賢君也楚莊書葬則難乎其稱公也生可以子正其實沒不可以公矯其名正其名者隱其實雖在吳越則亦猶此矣成公十有四年冬秦伯卒秦無亂焉而不葬何也秦桓公既敗令狐之盟召狄與楚欲道以伐晉於是晉使吕相絶秦然則春秋惡惡止於其身肆恕死者之罪晉絶秦而春秋絶之何也曰春秋本魯者也魯奉霸主之令不賻不襚則春秋亦不得賻襚之矣然而秦穆之親賻襚而卒葬不及秦穆何也曰是所謂惴惴而栗者也十有五年夏六月宋公固卒秋八月庚辰葬宋共公何其速也穀梁子曰葬共姬不可不葬共公姬從公者也公非從姬者也且共姬未卒是為蕩澤之亂也桓族將有事而先葬共公猶突忽將有事而先葬莊公也故禍亂之生必先自瓌禮始也其朕兆先見而衆莫之察若鄭之葬莊公宋之葬共公皆以諸侯而降大夫之禮者也十六年夏四月辛未滕子卒是何例也猶隱公八年夏六月辛亥宿男卒也生細而沒大以細則有其日月以大則去其名或曰從其訃也而爵則不訃甚矣國之無人也以文王之昭闕於禮法而卒與宿男伍故禮者𢎞人之道也爵者非𢎞人之道也十七年十二月邾子貜且卒是猶之蘧蒢也十八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲是葬于翼東門之外以車一乘是亦賊也可以不討乎曰舉臣而弒其君則罪在臣舉國而弒其君則罪在君罪在君則其不葬者在君罪在臣則其不葬者在臣然則春秋與欒書與曰何為其與欒書也然則春秋不與悼公與曰何為其不與悼公也晉悼公之再霸十五年又八年而欒氏滅於是仲尼始生天覆欒氏厲公改葬則州蒲之賊亦可以不討也故齊以桓公葬諸兒晉以悼公葬州蒲繼事之大大於殺賊襄公元年九月辛酉天王崩二年春王正月葬簡王是五月也是以天王而降諸侯之禮天王而降諸侯甚於諸侯而降大夫者也六月庚辰鄭伯睔卒鄭成公何以不葬猶之蔡穆公也蔡侯肸鄭伯睔皆以從楚不葬則是春秋不恕死者也曰春秋恕死者而官命未改則彼自取之成公卒不一月而晉人謀鄭不五月而城虎牢則是鄭不得息肩也不得息肩則何書葬之有七年冬十有二月鄭伯髠頑如會未見諸侯丙戌卒于鄵陳侯逃歸八年夏葬鄭僖公鄭僖公之卒弒也誰弒之鄭子駟弒之子駟未討而書葬何也曰志正也其志正何也楚圍陳晉會諸侯于鄬將以救陳陳侯逃歸以自救也鄭伯不逃歸以從諸侯諸大夫弒之則為楚者也春秋葬之則為王者也然則何以不書弒而又書葬也書弒而又不討賊則不得書葬書卒而又不書葬則無以異於鄭成公父子異志而春秋異義故春秋權也量物之輕重而為之衡者也十有二年秋九月吳子乘卒十有三年秋九月庚辰楚子審卒其不葬已著之矣或日或不日楚詳而吳略也十有五年冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公是方三月也悼公三駕卒以服楚於蕭魚自桓文而後未有盛於悼公者而卒葬三月以霸主冒大夫之禮亦春秋之所畏也然則是猶之宋共公與共公之亂兆於蕩澤是其在中行伯與中行伯急於得諸侯將執邾子莒子以許伐楚而廢公之遺言故功利者春秋所不貴也荀偃之急於操盟與蕩澤之急於得政皆亂也亂恆敗功功不勝亂則溴梁之會荀偃之罪府也然則邾莒無罪乎曰小國不幸當齊楚之衝行李餽遺何罪之有十七年春王二月庚午邾子牼卒微之為齋而侵我無所異於莒黎比者也春秋無微夫謂其不成喪也不然何以葬杞孝公又何以葬邾悼公二十有五年夏五月乙亥齊崔杼弒其君光是莊公也葬於士孫之里四翣不蹕下車七乘不以兵甲是有十人焉不足以死亦不足以葬有重丘之盟則崔氏之賊不可得也三十年夏四月蔡世子般弒其君固冬十月葬蔡景公異之也春秋之異者獨此耳以為甚之也而同於許世子止是輕比之也以為臣不葬而子不可不葬也然則蔡靈公之見恕於春秋何也曰是必有逸事焉以免於討三十一年十有一月莒人弒其君密州展輿之立猶之莒僕也因亂而立亦不足以葬亦不足以弔謂其有幸君之心也昭公元年冬十有一月己酉楚子麇卒楚公子比出奔晉是不書葬者亦無從問賊矣然則吳不書葬猶書曰閽弒吳子餘祭何也吳太伯之後也吳子卒魯人哭之先公之廟未為失也江漢之濵誰問之則亦問之公子比而已然則公子比非賊乎曰君弒而出奔晉踰年而反反而弒君何為其非賊也八年夏四月辛丑陳侯溺卒猶從其哀而葬之是春秋之恕也陳侯溺生而逃盟死而縊是不足以葬矣而亦葬之惡夫楚之滅陳而葬之也楚之僣王猾夏寖以盛矣故春秋哀明德之後而惡僣亂之國非以奬陳正以攘楚也豈惟扶弱抑強之謂哉十三年夏四月楚公子比自晉歸于楚弒其君虔于乾溪楚公子棄疾殺公子比春秋之不罪虔而罪比何也春秋貴討賊而賤逃死逃死而不討賊不討賊而又自為君則甚於賊者矣故郟敖靈敖之賊皆歸於子比而棄疾無過焉是春秋之治也然則春秋畏強禦而逸賊者與曰春秋惡人之相殺而無已也是季札子之志也冬十月葬蔡靈公靈公之不葬三十一月矣身弒其君而見誘於敵三年而後葬之穀梁子曰變之不葬有三失德不葬弒君不葬滅國不葬然且葬之不與楚滅且成諸侯之事也十有四年八月莒子去疾卒不葬亂也十有九年夏五月戊辰許世子止弒其君買冬葬許悼公弒而得葬則是賊得也許止之與莒展輿同例乎曰同於蔡般同於蔡般則甚也是重比之也夫使春秋無傳則許止之與蔡般同誅者乎抑以蔡般誅許止抑以許止宥蔡般是春秋之所深隱也春秋不以子沒父不以父沒子於此則必有取之也二十七年夏四月吳弒其君僚將謂惡不討賊者乎謂惡尋殺者乎先事則惡不討賊後事則惡尋殺兩者所以綱紀也且使討賊與尋殺同例則後起者得也是猶非春秋之志也三十二年十有二月己未公薨于乾侯定公元年夏六月癸亥公之喪至自乾侯戊辰公即位秋七月癸巳葬我君昭公喪至而即位即位而後葬葬而别於墓道之南以是為去成康為未久也其去之久已逺矣十三年冬薛弒其君比謂惠公夷之不能討賊亦不能葬也以為猶著於宿男焉而終君臣於春秋哀公四年春王二月庚戌盜殺蔡侯申盜者誰公孫翩也翩殺而書葬雖十月未緩也十年三月戊戌齊侯陽生卒齊之弒陽生以悅吳師非義也陽生弒荼而自立春秋已去其子而與其卒書其葬何也曰陽生實卒也而齊借其死以悅吳師使吳子三日哭于軍門之外然則春秋不惡吳子與曰春秋道其實也春秋以禮與吳不以禮與楚不以禮與吳楚而還與春秋若葬陳靈公蔡靈公之事是也春秋與楚討賊葬陳靈公不與楚滅國不葬蔡靈公故春秋之與奪大於天王而正於霸主易曰正大而天地之情見矣然則春秋以子弒父者有之乎曰未之見也莒弒庶其莒僕因之竊寶以殺季他也歸獄於僕莒弒密州展輿因之竊國竊國之罪重於竊寶而春秋兩貰之則安知夫許止之為嘗藥與蔡般之為子禍與罪許止以為奔齊而許止已歿葬蔡般以為罪楚而楚之惡不及蔡般之惡也故春秋所見以天下果未有此也何以見之曰於誘蔡侯般見之也蔡侯般之罪大於夏徴舒則申之執何為其無鐘鼓也故春秋者天下之至恕也然則萇𢎞之言不驗乎曰以子弒父何十二年之有也不二章第二十三子云孝以事君弟以事長示民不二也故君子有君不謀仕唯卜之日稱二君喪父三年喪君三年示民不疑也父母在不敢有其身不敢私其財也示民有上下也故天子四海之內無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也父母在饋獻不及車馬示民不敢専也以此坊民民猶忘其親而二其君桓公十有八年秋天王殺周公黑肩王子克奔燕春秋不書何以不書也惡其似桓公者也天子之討能行於封內不能行於諸侯其壞法亂紀亦自天子始也自天子始如何初王子克有寵於桓王桓王將立之屬於周公黑肩辛伯諌曰並后匹嫡兩政耦國亂之本也周公弗從至是莊王立二年矣周公二於王將立子儀子儀即克也辛伯聞之以告莊王王殺周公黑肩王子克出奔燕故為人臣者不可以二為人弟者不可以二黑肩有功於桓王而卒以戮死故羽父共仲仲遂行父之免於王法則幸也惜乎莊王不敢討魯也而又來錫桓公命莊公十有九年秋王子頺伐王師不克出奔衛衛人燕人入周立子頺是大事也而春秋不書何也春秋將以天王正天下之諸侯而先為繩尺以正天王則無以正天下之為諸侯者故繻葛之戰君子之所諱也諱繻葛并子頺而諱之然後知諱魯之不得已也謂其去成康猶未逺也臣不可以二其君弟不可以二其兄二十年夏天王出居于櫟是皆不書春秋不樂以天正王不樂以王正天下初莊王嬖王姚生子頺子頺有寵蒍國為之師及莊王崩僖王在位僅五年而惠頺王立惠王稍侵先臣之田蒍國與諸臣失祿者奉叔以攻王宫不克出奔溫蘇子以衛師燕師伐周立子頺明年鄭伯和王室不克執燕仲父遂以王歸處于櫟鄭伯入成周執寶器歸又明年鄭伯與虢公同代王城殺王叔頺及五大夫是王叔也以莊王之寵不二於僖王而二於惠王蓋其藴二再世矣魯不能討而鄭厲公能討之故春秋之恕鄭厲公有以也夫然則天王出居于櫟與鄭伯之入于櫟有異乎曰天王入於廟升自阼階即位於堂百辟皆備諸侯朝夕餼百執事禮也僖公五年會王世子于首止乃書世子者誰太子鄭也惠王不怵於子克子頺之禍又寵惠后愛少子帶欲廢太子而立之公會齊侯宋公陳侯衛侯鄭伯許男曹伯以定太子王恚使周公召鄭伯曰吾撫女以從楚輔之以晉無憂諸侯矣鄭伯懼逃歸於是諸侯伐鄭又明年王崩諸侯盟于洮先定王位而後發喪王子帶召伊洛之戎焚王城王討叔帶叔帶奔齊後十年乃召而復之於是王崩王討亦皆不書所不書者畏以王室間於內難關雎鵲巢之誼息則春王正起月之義起春王正月之義息則律量繩尺皆無所從也是春秋之所以恕也故謂春秋治嚴者過也僖公二十四年冬天王出居于鄭天王再出居矣於是乃書者何責魯也責魯者何首止之會齊桓實在是圖王室定計於鮮子頺之禍鄭厲焉依蓋未専告魯也於是宋襄沒矣重耳未入魯不急王難而臯蹈四年以待秦晉之師左氏傳曰隗氏之亂頺叔桃子奉叔帶以敗王師王出適鄭處于泛帶以隗氏處于溫王使來告難曰不榖不德得罪於母弟之寵子帶鄙在鄭地泛敢告叔父臧文仲對曰天子蒙塵於外敢不奔問官守王使簡師父告於晉左鄢父告於秦鄭伯與三大夫省視官具於泛而後聽其私政禮也王新伐鄭鄭猶不敢缺於王禮魯承王命而儳焉仰於秦晉使天子蒙塵四年於外向微重耳則周之為狄久矣魯以八百乘之國四應諸侯再盟衛莒南乞楚師東取齊榖入祀圍宋夫非有二心於王室何其從楚之驟也故曰責魯責魯者責其忘王室而有二心於楚也宣公元年春王正月公即位公子遂如齊逆女夏季孫行父如齊公會齊侯于平州公子遂如齊六月齊人取濟西田記者之言其為宣公與宣公之二於子赤一也私於襄仲二也謀君三也短喪四也喪娶五也獻濟西田六也不聞於天子而私請之諸侯七也襄仲殺子赤而立宣公哀薑大歸于齊宣公患齊之討也越喪而娶於齊賂以濟西之田吉行而會於平州平州者齊泰山之西州也以為成乎會則莫之討夫亦誰討之乎而徒喪其田詩曰錫之山川土田附庸夫猶是魯公之田也亦猶是周公之喪也以田賂齊如之何其以喪賂齊也故魯之有二心者或謂宣公也成公五年冬十一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢曰已二矣去天子之喪方四十日也至者可不聞聞者可不至其至之而聞聞之而至者乎于是則亦有禮焉惜乎莫之講也昭公四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申左氏曰楚子合諸侯於申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓乃使問禮於左師與子産左師獻公合侯之禮六子産獻伯子男會公之禮六王使楚椒舉侍於後以規過卒事不規王問其故對曰禮吾未見者有六焉又何以規宋太子佐後至使椒舉辭之弗見徐子吳出也以為二焉執之楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也夏桀為仍之會有緡叛之商紂為黎之搜東夷叛之周幽為太室之盟戎狄叛之皆所以示諸侯汰也今君毋乃以汰乎楚子弗聽甚矣楚子之二也其於六王二公猶之蒲宫執戈之智也先事後祿章第二十四子云禮之先幣帛也欲民之先事而後祿也先財而後禮則民利無辭而行情則民爭故君子於有饋者弗能見則不視其饋易曰不耕穫不災畬凶以此坊民民猶貴祿而賤行文公九年春毛伯來求金非禮也禮相見以贄聘問以幣以金次龜燕私之際也君子言不及利居不及玩好二霸之會也未嘗有賂毛伯求金而後諸侯大夫上下徴賂終春秋之世非賄不免故春秋所惡自叛逆而外唯賄而已詩曰或以其酒不以其漿鞙鞙珮襚不以其長言大國徴求小國之無所祈免也文公十五年冬十有一月諸侯盟于扈左氏曰晉侯宋公衛侯蔡侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還于是有齊難公亦不會然公則可以不會也以齊之伐魯也故謀伐齊以齊之納賂也而郤八國之師則是以八國之師取賂於道也齊以賂免魯必以不賂禍齊將取償於魯而魯必以賂奉齊是陽榖之盟之所繇始也十有六年春季孫行父會齊侯于陽榖齊侯弗及盟六月戊辰公子遂及齊侯盟于郪丘季孫之辭盟賂不至也公子遂之盟賂至也以郪丘之賂償扈之賂猶恐其不至也是齊與魯教賂無已也詩曰以爾車來以我賄遷宣公元年六月齊人取濟西田公羊子曰外取邑不書此何以書所以賂齊也曷為賂齊為弒子赤之賂也元年秋楚子鄭人侵陳遂侵宋左氏曰宋人之弒昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又會諸侯于扈將為魯討齊皆取賂而還蓋一平於宋兩會於扈皆賂矣鄭穆公曰晉不足與也遂受盟於楚與楚侵陳遂侵宋故鄭之書人非貶也其人鄭猶之人晉也七年冬公會晉侯宋公衛侯鄭伯曹伯于黑壤與於會不與於盟止也止而不書何也以賂免也左氏曰鄭及晉平鄭子公之謀也故相鄭伯以會冬盟於黑壤王叔桓公臨之以謀不睦晉侯以公之不朝也又不使大夫聘乃止公諸侯盟於黃父公不與盟以賂免受賂者誰晉靈公也行賂者誰公子遂也公子遂以賂為功者也十年春公如齊公至自齊齊人歸我濟西田何歸之歸亦賂也公以女妻髙固髙固請之則是公賂女也成公二年冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀穀梁子曰楚其稱人何也於是而後公得其所也會與盟同月則地會不地盟不同月則地會地盟此其地會地盟何也以公得所申其事也今之屈向之驕也屈者何謂盟則公為政嬰齊稱人驕者何謂會則嬰齊為政公就會也嬰齊之所屈於公者何受公賂所也嬰齊之所驕於公者何欲取公賂也然則公之得者賂也何賂之執斫執針織紝皆百人蓋女賂也然則是非匱盟也而曰匱盟何也曰晉將匱我是可一也不可以再是皆所謂無辭而行情貴祿而賤行者也是會也有壞坊者四焉四者何也晉為盟主而竊與楚盟一也盟楚則必賂楚賂楚則必賂晉二也蜀及陽橋皆在城下三也蔡侯許男皆乘楚車不列於位而我與之比四也故春秋盟會之法至於蜀而匱矣而獨以城下之耻聞三年春王正月公會晉侯宋公衛侯曹伯伐鄭宋衛皆未葬而稱公侯故宋衛之不子蔡許之無位是春秋之所以匱也十年公會晉侯齊侯宋公衛侯曹伯伐鄭初晉之執鄭伯也踰時未歸公孫申曰我急君則晉止君我出師以圍許為將改立君者則晉必歸君矣明年二月鄭子如立公子繻鄭人殺繻立髠頑欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君五月晉景公薨厲公立鄭子罕賂晉以襄鍾子駟為質乃歸鄭伯故質不如賂之信也譎不如賂之巧也然則自宣公而後有以無賂免者乎楚之求鄭也而猶重賂况其下者乎有之則士燮之不以賂免郯也夫與其以賂免猶愈於立君而免也與賂喪貨立君喪鬯秋七月公如晉晉人止公使送葬春秋不書不書者何謂諸侯之不勤諸侯也惜乎其不以賂免也賂免之辱正於喪盟之辱乎曰以臣而自免則胃也以臣而免君則道也惜乎蜀之盟未為得所也然則後將執君求賂焉如何曰是亡國之誨也傷之云耳襄公二年齊侯伐萊春秋不書惡寺人之通賂也寺人通賂則國無不賂者矣左氏曰齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還君子以是知齊靈公之為靈也天下之靈者獨齊靈公乎哉詩曰誰能執熱逝不以濯襄公十一年夏鄭公孫舍之帥師侵宋何以侵宋曰決晉楚也晉楚爭鄭鄭奔命之不遑曰吾伐宋以決之伐宋則晉必怒晉怒驟來楚不能驟救吾乃重賂晉而逺謝楚也於是楚鄭伐宋晉會諸侯于蕭魚悉師伐鄭鄭請行成于晉晉侯赦鄭囚禮而歸之納斥堠禁侵掠告成于諸侯公使臧紇對曰凡我同盟小國有罪大國致討苟有藉手鮮不赦宥寡君聞命矣於是鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備兵車百乘歌鍾二肆女樂二八及其鎛磬夫以晉悼公也而亦行賂乎其厲公二五之餘沴夫襄公二十五年夏公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀是伐齊也伐齊者何朝歌之役齊始伐晉張軍於熒庭晉將執之而崔杼弒莊公以悅於晉使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長及處守者皆有賂晉侯許之於是晉送衛侯帑於夷儀崔子止之以求五鹿晉亦不敢問也而與齊同盟於重丘甚矣賂之為利也使盟主可伐賊可不討同盟可執舊怨可釋也甚矣賂之為利也於是趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶為政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭記所謂禮先於幣帛者其謂此乎朝聘燕享禮也庭實貨賄幣也趙武能率士燮之政則庶乎免矣方范宣子之為政也諸侯之幣重子産寓書於子西以告曰子為晉國不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難諸侯之賄聚于公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將安用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨汝無二爾心有令名也夫恕思以令德則令名載而行之是以逺至邇安無寧使人謂子實生我而謂子浚我以生乎宣子悅乃輕幣以子産之善規也而獨有取帶於叔孫豹取錦於季文子取冠於公孫舍者故無辭而行情君子之所禁也遺利章第二十五子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩云采葑采菲無以下體德音莫違及爾同死以此坊民民猶忘義而爭利以亡其身是其為季文子晏平仲鬬子文氏之行與其為苦成叔令尹子常羊舌鮒氏之行與季文子相宣成無衣帛之妾無食粟之馬仲孫它曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者多矣吾是以不敢人之父兄食粗衣惡而我美妾與馬無乃非相人者乎且吾聞以德榮為國華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠文子聞之曰過而能改者民之上也使為上大夫齊侯疥遂店期而不瘳諸侯問疾者多在梁丘據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾為諸侯憂是祝史之罪也盍誅於祝同史嚚以謝賔公説告晏子晏子曰有德之君外內不廢動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉適遇淫君內外頗邪上下疾怨斬刈民力以成其違祝史薦信進退無辭鬼神不饗祝史與焉所以天昏孤疾者為曓君使也公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫強易其賄布常無藝徴斂無度宫室日更淫樂不違內寵之妾肆奪于市外寵之臣僭令於鄙民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝詛若欲誅於祝史不如修德矣公説使有司寬政毁關去禁薄斂已責而公疾瘥不然雖狐裘三十年豚肩不掩豆待舉火者三百家猶未有遺民之利也鬬且廷見令尹子常子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問畜聚積實如餓豺狼焉殆必亡者也古者聚貨不妨民衣食之利聚馬不害民之用國馬足以行軍公馬足以稱賦不是過也公貨足以賔獻家貨足以共用不是過也貨馬郵則闕於民民多闕則有畔離之心將何以封矣昔鬬子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以羞子文至於今令尹秩之成王每出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取貨焉是勤民以自封也死無日矣我逃死非逃富也故莊王之世滅若敖氏唯子文之後在今子常先大夫之後也相楚君無令名于四方民之羸餧日甚四境盈壘道殣相望盜賊司目民無所放是之不恤而畜聚不厭其蓄怨多矣民心之愠也若防大川焉潰而所犯必大矣子常其能賢於成靈乎成不禮於穆願食熊蹯不獲而死靈王不顧於民一國棄之如遺迹焉子常為政而無禮不顧甚於成靈其何力以待之期年乃敗於柏舉子常奔鄭昭王奔隨故不顧遺利以取民者若楚子常是也叔向見韓宣子宣子憂貧叔向賀之宣子曰吾有卿之名而無其實無以從二三子吾是以憂子賀我何也叔向曰昔欒武子無一卒之田官不偹其宗器宣德行順憲則使越於諸侯諸侯親之戎狄懷之以正晉國以免於難及桓子驕泰奢侈貪欲無藝略則行志假貸居賄宜及於難而賴武之德以沒其身及懷子改桓之行修武之德可以免難而離桓之罪以亡於楚夫郤昭子富半公室其家半三軍恃其寵富以泰於國而身尸於朝家滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無德也今吾子有欒武子之貧吾以為能其德矣是以賀若不憂德之不建而患貨之不足將弔不暇何賀之有宣子拜稽首曰起也將亡賴子存之非起敢専承之其自桓叔以下拜吾子之賜故不爭利以亡身者韓宣子是也苦成叔不爭利猶可與欒桓子沒其身晉自羊舌鮒為大夫而列國多賂平丘之會次于衛地叔鮒求貨于衛淫芻蕘者衛人使屠伯饋叔向羮與一筐錦曰諸侯事晉未敢攜二况衛在君之宇下而敢有異志芻蕘者異于他日敢請之叔向受羮反錦曰晉有羊舌鮒者黷貨無厭亦將及矣為此役也子若以君命賜之其已客從之未退而禁之何為其賜之也曰叔向之權不足以制鮒也何為不足以制之也曰叔向不得君命叔魚能得君命其後叔魚竟以鬻獄尸於市故忘義爭利以亡其身羊舌鮒是也别嫌章第二十六子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也詩云伐柯如之何匪斧不克取妻如之何匪媒不得藝麻如之何橫從其畝取妻如之何必告父母以此坊民民猶有自獻其身是其為鄫季姬與何為季姬也曰未繫之鄫也未繫之鄫而能使鄫子何也鄫無大夫以婚禮待於境上不得親迎則曰遇不待反馬則曰朝禮變而之正求正而之野是皆有父母之命也不及兩廟以正其終始雖有嘉禮近於自獻其身故禮不親迎不廟見猶之乎遇也僖公十有四年夏六月季姬及鄫子遇于防使鄫子來朝來朝則俱朝也不得曰以鄫子來朝於是越歲而于歸猶之不廟見也左氏曰鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝止則不遇遇則不止且未繫之鄫故左氏詳外政而略內事也十有五年九月季姬歸于鄫何其久也公如齊從于牡丘九月始歸公歸而後季姬歸禮也十有六年夏四月丙申鄫季姬卒書日書國無所異於宋共姬也故季姬猶為有禮也季姬沒三年而鄫子用於睢社僖公不哀故鄫子則為匱禮也季姬非匱禮者也春秋之於諸姬多稱焉二十三年冬十一月杞子卒杞成公也二十七年春杞子來朝杞桓公也秋乙巳公子遂帥師入杞杞以客禮傲宗國二十八年秋杞伯姬來謝討也三十一年冬杞伯姬來求婦母黨之請婦未失禮也大國聘幣以卿大夫小國命于舅姑詩曰娶妻如之何必告父母伯姬求婦而以為非禮則杞有卿大夫之役焉而又以杞為傲文公十二年春王正月杞伯來朝二月庚子子叔姬卒哀叔姬也哀叔姬而爵杞伯何也曰杞伯來朝亢則抑之哀則揚之哀吾之子以及其宗夫為春秋者固得以子女進退人爵乎曰爵非春秋所自與也禮則春秋得而與之春秋以禮當爵亦得以爵當禮也成公四年春杞伯來朝五年春王正月杞叔姬來歸八年冬十月癸卯杞叔姬卒九年春王正月杞伯來逆叔姬之喪以歸是則杞子之所為伯也杞伯同盟五十年矣再娶於魯出其婦不遺其喪則甚矣齊之歸叔姬者也弒其君而棄其母終惠公之世無有逆其喪者故曰夫婦之道廢而谷風之怨興哀杞叔姬所以弔齊叔姬也然則二叔姬有罪乎曰哀也何罪之有厚别章第二十七子云取妻不取同姓以厚别也故買妾不知其姓則卜之以此坊民曾春秋猶去夫人之姓曰吳其死曰孟子卒記者之不與魯春秋何也曰是所以正春秋也正春秋而後春秋不繫於魯不繫於魯則仍魯春秋之辭何也曰權不變衡繩不改尺正其大者而其不正者皆正矣故文者附質而文者也質不變文文不損質故忠信者春秋之教也晉公子重耳之入秦也秦伯歸女五人懷嬴與焉公子欲辭司空季子曰同姓為兄弟黃帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為己姓青陽方靁氏之甥也夷鼓彤魚氏之甥也其同生而異姓者四母之子别為十二姓凡黃帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕葴任荀僖姞儇依是也唯青陽與倉林氏同於黃帝故皆為姬姓同德之難也如是昔少典取於有蟜氏生黃帝炎帝黃帝以姬水成炎帝以薑水成成而異德故黃帝為姬炎帝為薑二帝用師以相濟也異德之故也異姓則異德異德則異類異類雖近男女相及以生民也同姓則同德同德則同心同心則同志同志雖逺男女不相及畏黷敬也黷則相怨怨亂育災災育滅姓是故娶妻避其同姓畏亂災也異德合姓同德合義姓義相更成而不遷乃能攝固保其土房今子於子圉道路之人也取其所棄以濟大事不亦可乎甚矣胥臣之辭也歸女五人豈無歡者而必懷嬴君子猶畏其無别也鄭叔詹曰同姓不婚惡不殖也狐氏出自唐叔狐姬伯行之子也實生重耳成而俊材違離而得所是則同姓之不别晉猶有戎風焉昭公元年晉侯有疾鄭伯使公孫僑聘晉且問疾叔向問曰寡君之疾病卜人曰實沈臺駘為祟史莫之知此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也日尋干戈后帝不臧遷閼伯於商丘主辰商人是因故辰為商星遷實沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑薑方震太叔夢帝謂已命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之成王滅唐而封太叔故參為晉星繇是觀之則實沈參神也昔金天氏有裔子曰昧為元冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣繇是觀之則臺駘汾神也抑此二者不及君身若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃一之則生疾矣僑又聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君內有四姬焉其無乃是也乎若繇是二者弗可為也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也故春秋之知禮者唯子産也哀公十二年夏五月甲辰孟子卒是所為吳孟子也何謂之吳孟子也吳或得子出而稱孟子也公方幼而季孫為政公不得自娶孟子公娶孟子則大臣主之公不得自為政自楚敗鍾房以前公朝章華而後公皆未嘗入吳又自邾莒發難五郤於晉公親見止兩執大夫未嘗藉吳之力故孟子之非吳宗廟祝史所薦信也而孟子之稱吳甥舅伯叔之藉口也當時公若之妹為宋元公夫人生祁適季平子於昭夫人同姓也故或以逐平子告夫人未有逐平子告吳者也又二十餘年叔還始會吳于柤故自哀公六年以前吳未有盟會征討與魯之事也吳楚始競吳數敗楚魯以子出於吳而繫於吳謂吳孟子以張魯亦以張子也陳實張楚而藉吳見譏夫有結婚強吳三十年無一介之問及至河五反身屈於齊庭與公子憖相見不肯入晉而猶曰娶吳者乎然則娶吳之説孰為之曰季孫為之季孫絀昭公欲絀昭夫人不及哭不附於廟孟子之卒孔子與弔季孫不絻故絰而拜謂是同姓非吾小君也是仲尼之所悲也然則同時無有明之者何也曰季氏之服魯久矣季氏戮昭公又以戮公之夫人魯人信之播於外國故魯人之智不及榮駕鵝之智也然則仲尼之不正孟子何也曰閫事也閫事無諍辟逺章第二十八子曰禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮子云寡婦之子不有見焉則弗友也君子以辟逺也故朋友之交主人不在不有大故則不入其門以此坊民民猶以色厚於德舊分二節君子公言不及內黨夫子何間之諄也曰未有不間而誠者也易曰間邪存其誠謂其近情也而間之間之不止而又明言之不明言之則必有未間者存焉故又重間之也莊公二年冬十有二月夫人薑氏會齊侯于禚四年春王二月夫人薑氏享齊侯于祝丘七年春夫人薑氏會齊侯于防冬夫人薑氏會齊侯于榖祝丘之有享則是大饗未廢也所謂陽侯繆侯者晉楚之春秋與抑列國之春秋與桓公二年春王正月戊申宋督弒其君與夷及其大夫孔父左氏曰宋華父督見孔父之妻於路目逆而送之曰美而艷於是攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡故先書弒其君孔父之不能間家則亦與有討也息媯之美而滅蔡與息夏姬棠薑皆夭數夫而滅人之宗故君子立教質言之而不諱詳言之而不穢也若不入主婦之門不友寡婦之子是也詩曰折栁樊圃狂夫瞿瞿是之謂也民紀章第二十九子曰好德如好色諸侯不下漁色故君子逺色以為民紀故男女授受不親御婦人則進左手姑姊妹女子已嫁而反男子不與同席而坐寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫佚而亂於族為是坊者其唯敬薑與敬薑者公父文伯之母也朝哭穆伯而暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章公父文伯之卒也敬薑我其妾曰吾聞之好內女死之好外士死之今吾子天死吾惡其以好內聞也二三婦之辱共先祀者請無瘠色無洵涕無搯膺無憂容有降服無加服從禮而靜是昭吾子也仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知也夫又曰公父文伯之死妾經而殉者三人賢士未有至者敬薑遂不哭也敬薑之將室文伯也饗其宗老而為賦緑衣之三章老請守龜卜室之族師亥聞之曰善哉男女之饗不及宗臣宗室之謀不過宗人謀而不犯微而昭矣敬薑者季康子之從祖叔母也康子往焉䦱門而與之言皆不踰閾祭悼子康子與焉酢不受徹爼不宴宗不具不繹繹不盡飫則退仲尼聞之以為别於男女之禮矣敬薑如季氏康子在其朝與之言弗應從之及寢門弗應而入康子辭於朝而入見曰肥也不獲命無乃罪乎敬薑曰子弗聞乎天子及諸侯合民事於外朝合神事於內朝自卿而下合官職於外朝合家事於內朝寢門之內婦人治其業焉上下同之夫外朝子將業君之官職焉內朝子將庀季氏之政焉皆非吾所敢言也然則記者之言其崇敬薑與其猶為祝丘之享防榖之會也曰夏徴舒之從殺其君東郭偃之嗣滅其宗涇上之粲不歸於王莒處之帷不聘而從君子猶或非之故蔓草零露非鄭志則莫之誦也親迎章第三十子云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者親迎禮之始事也而坊記以為卒事言人事之終始也哀公曰冕而親迎不已重乎孔子愀然作色曰合二姓之好以繼先聖之後以為天地宗廟社稷之主何謂已重乎故親迎即位薨葬郊祀勤王此五者春秋所以坊德也五者皆失而以命從欲先王之刑乃窮矣故聖人以天命禮以天命刑以天命命而一其權量於春秋丁寧終始於昏迎之事易之咸恆詩之關雎亦與坊記同義也桓公三年秋七月壬辰日有食之既公子翬如齊逆女九月齊侯送薑氏于歡公會齊侯于歡夫人薑氏至自齊榖梁傳曰禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言送女踰竟非禮也左氏曰凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之然則是為卿逆君婦者也諸侯自親迎而公不送女可乎曰何為不可也君有社稷之守壻有宗祧之重子子父父何為其不可也且夫桓非親迎者也厚幣而自固者也然則自歡而後魯不入齊者何也曰春秋之許魯猶以有别也齊有風而魯無風莊公二十四年夏公如齊逆女秋公至自齊八月丁丑夫人薑氏入是親迎也親迎而婦不至公至踰月而後乃入則猶之不至也故哀薑之不正終曰過始也過始則美盡矣美盡於始者蠱壞於卒也文公二年冬公子遂如齊納幣四年夏逆婦薑于齊髙子曰略也略則公子遂之略之也左氏曰貴聘而賤逆之娶于大夫而卿聘之不使卿逆之卿傲其大夫而適傲其夫人族下不尊親寡無援赤視之不允則自此始矣然則公娶於大夫亦可親迎乎曰公娶於大夫舍於先公之廟公為之主亦使卿送之大國則無娶於它國之大夫者也而魯以髙國比於婦薑宣公元年春公子遂如齊逆女三月遂以夫人婦薑至自齊婦者宗廟之婦非為姑婦之也且是有夫夫其公子遂逆而敬嬴迓之一仲遂也而以夫人及婦不難乎其為子與夫者乎故春秋之文苦詳也文詳則旨疑成公十四年秋叔孫僑如如齊逆女九月僑如以夫人婦薑至自齊是猶之仲遂也夫其叔孫僑如逆而穆薑迓之穆薑之於敬嬴叔孫僑如之於仲遂可以同辭可以同情幸乎其不親迎而猶且至也然則莊公之會杞伯姬於洮與齊侯之送薑氏於歡有異乎曰均之乎愛女也非所以愛禮也然則莒慶之逆叔姬齊髙固之逆子叔姬有異乎曰均之乎親迎也莒細而從髙挾而倨然則杞伯姬之來鄫季姬之歸皆細也而春秋謹書之何也曰家人與睽互相反也家人在內而間睽在外而疑其間之曰悔亡其疑之曰豕曰鬼曰張弧曰脫弧故家人反外雖聖人不能不疑者誠敬之也誠慎之也謂禮刑命三畏者之所攸寄也故唯記者為深知春秋之義也坊記集傳卷二
