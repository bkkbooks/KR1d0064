body:
  text: 坊記集傳禮類三禮記之屬提要臣等謹案坊記集傳二卷明黄道周撰道周有三易洞璣别著録此書乃道周在經筵日纂輯進呈之本其自序以為聖人之坊亂莫大于春秋故是書之體以坊記為經而每章之下皆臚舉春秋之事以證之但國語所載若内史過之論虢亡近于語怪而以為借神怪以防欲義涉荒忽𨼆公元年鄭伯克段于鄢而以為為三桓而𤼵夫三桓之事春秋著之詳矣而乃寓其意于鄭伯之克段是舍形而論其影也又戴記本為一篇而分為三十章章各創為之目上卷之目曰大坊第一去亂第二己畔第三章别第四盍旦第五逺害第六人浮于食第七貴讓第八作讓第九可託第十酌言第十一讓善第十二作忠第十三作孝第十四敬美第十五下卷之目曰微諫第十六睦族第十七敬辨第十八敬老追孝第十九食義第二十教敬教睦第二十一卒事第二十二不貳第二十三先事後禄第二十四遺利第二十五别嫌第二十六厚别第二十七辟逺第二十八民紀第二十九親迎第三十亦非説經家法第其意存鑒戒于君臣父子夫婦兄弟之間原其亂之所自生究其禍之所終極言之頗為剴切且坊記之文如曰制國不過千乗都城不過百雉家富不過百乗以此坊民諸侯猶有畔者是隠為春秋書大夫之强起例又云春秋不稱楚越之王喪則明著春秋之法孟子引孔子曰其義則丘竊取之坊記所述固春秋之義之散見者則道周此書亦非漫無所據盡出附會也乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀坊記集傳原序臣聞之記曰禮禁亂之所繇生猶坊止水之所自來也以舊坊為無所用而壞之者必有水敗以舊禮為無所用而棄之者必有亂患亂患之坊莫大於春秋聖人本春以立禮本王以立刑本天以立命命以坊欲刑以坊淫禮以坊德三坊立而亂患息亂患息而後禮樂可舉也易之立坊始於天地以天地而正父子以父子而正君臣以君臣而正夫婦詩始於夫婦春秋始於兄弟三始雖殊其以坊德坊淫坊欲則一也左氏以春秋之亂魯始於羽父終於三桓晉始於曲沃終於六卿故於鄭伯克段之章首明其義以為寵禄不過都城有制為立坊之要領因而推於桓莊文宣之間外釁所從入内慝所從出歸重於别㣲明嫌為立坊之要歸坊記因之以端源於禮制鄣流於淫欲先之以敬讓衷之以孝悌終始於富而不驕貴而不淫以為君臣父子夫婦昆弟朋友之所繇正雖其所稱引不過楚䘮晉亂呉子三事而於以定君臣辨上下正妃耦春秋千七百餘事其大指盡於此矣蓋當時夫子既作春秋諸子莫讚一辭退而窺其意義不過以扶綱出條明堯舜之道闡文武之憲其大者在於䘮葬婚娶其細者至於車服飲食登降揖讓皆示之以節受之以制是天地所以生成萬物之義也春秋以生成萬物為天地之大禮禮失而流於刑刑窮而反於命故先别其條貫以坊之而春秋之義例亦從是以起宋淳化至道間嘗以坊表二記頒賜廷臣今禮學備在學宫而習者相沿為曲臺遺言無復知為春秋義例之所從出者故復略舉大意使相屬比引伸觸類後有以究其指歸焉黄道周自序
